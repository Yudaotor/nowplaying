<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #0d0f14;
    color: #f5f6f8;
    display: grid;
    place-items: center;
    /* 内容比屏幕高时页面正常滚动(不再 overflow:hidden 裁切)；带安全区避让刘海/底条。 */
    padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
    overflow-x: hidden;
    position: relative;
  }
  #bg {
    position: fixed; inset: -60px;
    background-size: cover; background-position: center;
    filter: blur(60px) saturate(1.6) brightness(0.45);
    transition: background-image .8s ease;
    z-index: 0;
  }
  /* 廉价"流动渐变":三团由封面主色派生的柔光色斑，在模糊封面之上缓慢漂移，营造流动彩雾
     (纯 CSS、不读封面像素、几乎不耗电；--c1/c2/c3 由 setAccent 从 accent 派生)。 */
  #flow {
    position: fixed; inset: -25%; z-index: 0; pointer-events: none; opacity: .5;
    background:
      radial-gradient(42% 42% at 28% 30%, var(--c1, #6a4bd0), transparent 70%),
      radial-gradient(46% 46% at 72% 38%, var(--c2, #c0507a), transparent 70%),
      radial-gradient(52% 52% at 50% 76%, var(--c3, #3f8fd0), transparent 72%);
    filter: blur(64px) saturate(1.25);
    animation: flow 34s ease-in-out infinite alternate;
    will-change: transform;
  }
  @keyframes flow {
    0%   { transform: translate(-4%, -3%) rotate(0deg) scale(1.06); }
    50%  { transform: translate(3%, 4%) rotate(9deg) scale(1.16); }
    100% { transform: translate(-2%, 3%) rotate(-6deg) scale(1.09); }
  }
  @media (prefers-reduced-motion: reduce) { #flow { animation: none; } }
  .card {
    position: relative; z-index: 1;
    width: min(92vw, 400px);
    display: flex; flex-direction: column;
    padding: 32px 26px 26px;
    border-radius: 28px;
    background: rgba(22, 25, 33, .58);
    backdrop-filter: blur(30px) saturate(1.4);
    -webkit-backdrop-filter: blur(30px) saturate(1.4);
    border: 1px solid rgba(255,255,255,.08);
    box-shadow: 0 24px 80px rgba(0,0,0,.55);
    text-align: center;
    transition: opacity .35s ease;
  }
  /* 宽屏(≥820px)且有侧栏内容(歌词/历史)时，横向铺成两栏：左=正在播放，右=歌词+历史。 */
  @media (min-width: 820px) {
    .card.two-col {
      width: min(94vw, 900px);
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      grid-template-areas: "np side" "meta meta";
      column-gap: 44px; row-gap: 6px;
      align-items: start;
      padding: 40px 44px 28px;
    }
    .card.two-col .np   { grid-area: np; }
    .card.two-col .side { grid-area: side; display: flex; flex-direction: column; min-width: 0; }
    .card.two-col .meta { grid-area: meta; }
    .card.two-col .art-wrap { width: 240px; height: 240px; }
    .card.two-col .lyrics.show { height: 300px; margin-top: 2px; }
    .card.two-col .history-wrap { margin-top: 20px; border-top: none; padding-top: 0; }
    .card.two-col .history { max-height: 300px; }
  }
  .side { min-width: 0; }
  /* 首屏显示的是本地缓存的上一首，标记为“更新中”(降透明度)，拉到实时数据后恢复。 */
  .card.stale { opacity: .5; }
  .art-wrap { position: relative; width: 220px; height: 220px; max-width: 100%; margin: 0 auto 24px; }
  .art {
    width: 100%; height: 100%; border-radius: 20px; object-fit: cover;
    box-shadow: 0 16px 48px rgba(0,0,0,.55), 0 0 30px -4px var(--accent, transparent);
    background: linear-gradient(135deg, #2b2f3a, #1a1d26);
    transition: opacity .5s ease, box-shadow .8s ease;
  }
  .art.placeholder { display: flex; align-items: center; justify-content: center; font-size: 64px; opacity: .85; }
  /* 播放中封面随节奏轻微缩放“呼吸”(只动 transform，走合成层、不逐帧重绘)；光晕由 .art 的静态 box-shadow 提供，暂停时静止。 */
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.012); }
  }
  .art.playing { animation: breathe 3.8s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) { .art.playing { animation: none; } }
  /* ---- 黑胶模式(开关切换,存 localStorage)：外圈黑色带纹路胶片(静止),中心小圆放封面
     当唱片标签(播放时旋转),叠中央轴孔 + 唱臂 ---- */
  .disc, .spindle, .tonearm { display: none; }
  /* 黑胶盘:黑色 + 细纹路凹槽,accent 光晕。中心留给封面标签。 */
  .art-wrap.vinyl .disc {
    display: block; position: absolute; inset: 0; border-radius: 50%; pointer-events: none;
    background:
      repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,.05) 0 1px, transparent 1px 4px),
      radial-gradient(circle at 50% 50%, #131316 0 100%);
    box-shadow: 0 16px 48px rgba(0,0,0,.6), 0 0 30px -4px var(--accent, transparent);
  }
  /* 专辑封面缩成中心小圆(唱片标签),播放时慢速旋转。 */
  .art-wrap.vinyl .art {
    position: absolute; left: 17%; top: 17%; width: 66%; height: 66%;
    border-radius: 50%; box-shadow: 0 0 0 2px rgba(0,0,0,.55); z-index: 2;
  }
  .art-wrap.vinyl .art.playing { animation: vinylspin 18s linear infinite; } /* 慢速 */
  @keyframes vinylspin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .art-wrap.vinyl .art.playing { animation: none; } }
  /* 中央轴孔(静止,盖在标签中心)。 */
  .art-wrap.vinyl .spindle {
    display: block; position: absolute; left: 50%; top: 50%; width: 12px; height: 12px;
    transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 3;
    background: radial-gradient(circle, #d8dce2 0 36%, #12101c 42% 100%);
    box-shadow: 0 0 0 2px rgba(0,0,0,.5);
  }
  /* 唱臂:暂停时抬起(42°离盘)、播放时落到唱片外圈(8°)，平滑摆动。 */
  .art-wrap.vinyl .tonearm { display: block; position: absolute; top: 14px; right: 2px; width: 126px; height: 16px; transform-origin: right center; transform: rotate(42deg); transition: transform .6s ease; pointer-events: none; z-index: 3; }
  .art-wrap.vinyl.playing .tonearm { transform: rotate(8deg); }
  @media (prefers-reduced-motion: reduce) { .art-wrap.vinyl .tonearm { transition: none; } }
  .tonearm .bar { position: absolute; right: 8px; top: 6px; width: 106px; height: 4px; border-radius: 4px; background: linear-gradient(90deg, #c8cdd6, #8a91a0); box-shadow: 0 2px 6px rgba(0,0,0,.5); }
  .tonearm .pivot { position: absolute; right: 0; top: 0; width: 16px; height: 16px; border-radius: 50%; background: radial-gradient(circle, #e6e9ee, #8a91a0); }
  .tonearm .head { position: absolute; left: 6px; top: 2px; width: 14px; height: 11px; border-radius: 2px; background: #e6e9ee; }
  /* 切换按钮：卡片右上角小圆钮 */
  .vinyl-toggle {
    position: absolute; top: 14px; right: 14px; z-index: 4; width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    border-radius: 50%; border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.06);
    color: #9aa3b2; font-size: 16px; line-height: 1; transition: background .2s, color .2s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .vinyl-toggle:hover { background: rgba(255,255,255,.14); }
  .vinyl-toggle.on { color: var(--accent, #fff); border-color: color-mix(in srgb, var(--accent, #fff) 50%, transparent); background: color-mix(in srgb, var(--accent, #fff) 16%, transparent); }
  .status {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600; letter-spacing: .4px;
    padding: 6px 14px; border-radius: 999px; margin-bottom: 18px;
    background: rgba(255,255,255,.08); color: #9aa3b2;
  }
  .status.live { background: rgba(48, 209, 88, .16); color: #30d158; }
  .eq { display: none; align-items: flex-end; gap: 2px; height: 12px; }
  .status.live .eq { display: inline-flex; }
  .device-icon { font-size: 12px; opacity: .85; line-height: 1; }
  .device-icon:empty { display: none; }
  .eq span {
    width: 3px; border-radius: 1px; background: #30d158;
    animation: eq 1s ease-in-out infinite;
  }
  .eq span:nth-child(1) { height: 60%; animation-delay: -.4s; }
  .eq span:nth-child(2) { height: 100%; animation-delay: -.2s; }
  .eq span:nth-child(3) { height: 45%; animation-delay: 0s; }
  @keyframes eq { 0%,100% { transform: scaleY(.4);} 50% { transform: scaleY(1);} }
  h1 {
    font-size: 22px; font-weight: 700; line-height: 1.35; margin-bottom: 8px;
    overflow-wrap: anywhere;
  }
  .artist { font-size: 16px; color: #c8cdd6; margin-bottom: 4px; overflow-wrap: anywhere; }
  .album { font-size: 13px; color: #8a91a0; overflow-wrap: anywhere; }
  .progress { width: 100%; margin-top: 22px; display: none; }
  .progress.show { display: block; }
  .bar { position: relative; height: 4px; border-radius: 999px; background: rgba(255,255,255,.14); overflow: hidden; }
  .bar-fill {
    position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
    border-radius: 999px; background: var(--accent, #f5f6f8);
    transition: background .8s ease;
  }
  .times {
    display: flex; justify-content: space-between; margin-top: 8px;
    font-size: 11px; color: #8a91a0; font-variant-numeric: tabular-nums;
  }
  /* 同步歌词：固定高度视口，原生滚动把当前行滚到中间(可手动滑动)，上下渐隐遮罩。 */
  .lyrics { display: none; margin-top: 20px; height: 132px; overflow-y: auto; overflow-x: hidden;
    position: relative; overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; /* 可手动滑动，但隐藏滚动条保持干净 */
    -webkit-mask-image: linear-gradient(180deg, transparent, #000 22%, #000 78%, transparent);
            mask-image: linear-gradient(180deg, transparent, #000 22%, #000 78%, transparent); }
  .lyrics::-webkit-scrollbar { display: none; }
  .lyrics.show { display: block; }
  /* 上下留白 ≈ 半个视口，好让首行/末行也能滚到正中央(自动跟随与手动滑动共用)。 */
  .lyrics-inner { padding: 150px 0; }
  /* 每个歌词行可含三小行：罗马音(上)/原文(中)/翻译(下)。原文可逐字(yrc)或整行高亮。 */
  .lrc-line { padding: 6px 0; transition: opacity .3s ease; opacity: .5; overflow-wrap: anywhere; }
  .lrc-line.active { opacity: 1; }
  .lrc-roma { font-size: 11px; line-height: 1.25; color: #838a97; margin-bottom: 1px; }
  .lrc-main { font-size: 14px; line-height: 1.36; font-weight: 700; color: #aab0bc; transition: color .3s ease; }
  .lrc-line.active .lrc-main { color: var(--accent, #f2f4f7); } /* 行级高亮(无逐字时) */
  .lrc-tr { font-size: 12px; line-height: 1.25; color: #838a97; margin-top: 1px; font-weight: 400; }
  /* 逐字(yrc):每个词随时间从左到右"渐变扫过"填色,而不是整词硬切。--fill(0~100%)由
     syncLyrics 每帧更新,渐变里留一段软过渡区(±9%),看起来是慢慢填满这个词。 */
  .lrc-w { color: #7f8794; }
  .lrc-line.active .lrc-w {
    --fill: 0%;
    background-image: linear-gradient(90deg,
      var(--accent, #fff) 0, var(--accent, #fff) calc(var(--fill) - 9%),
      #99a0ad calc(var(--fill) + 9%), #99a0ad 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  @media (prefers-reduced-motion: reduce) {
    .lrc-line.active .lrc-w { background-image: none; -webkit-text-fill-color: currentColor; color: #aab0bc; }
    .lrc-line.active .lrc-w.sung { color: var(--accent, #fff); }
  }
  @media (prefers-reduced-motion: reduce) { .lyrics-inner { transition: none; } }
  .links {
    display: flex; flex-wrap: wrap; gap: 14px; justify-content: center;
    margin-top: 22px;
  }
  .ic {
    display: none; align-items: center; justify-content: center;
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
    color: var(--c); text-decoration: none;
    transition: background .2s ease, transform .1s ease;
  }
  .ic.show { display: inline-flex; }
  .ic:hover { background: rgba(255,255,255,.16); transform: translateY(-1px); }
  .ic svg { width: 22px; height: 22px; display: block; }
  .history-wrap { margin-top: 22px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,.08); text-align: left; }
  .history-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
  .history-title { font-size: 11px; font-weight: 700; letter-spacing: .6px; color: #6b7280; }
  .today-stat { font-size: 11px; font-weight: 600; color: var(--accent, #8a91a0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history {
    display: flex; flex-direction: column; gap: 1px;
    max-height: 264px; overflow-y: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.16) transparent;
  }
  .history::-webkit-scrollbar { width: 6px; }
  .history::-webkit-scrollbar-thumb { background: rgba(255,255,255,.16); border-radius: 3px; }
  .history::-webkit-scrollbar-track { background: transparent; }
  .history a {
    display: flex; align-items: baseline; gap: 10px; padding: 7px 8px;
    border-radius: 8px; text-decoration: none; transition: background .15s ease;
  }
  .history a:hover { background: rgba(255,255,255,.06); }
  .history .h-title { flex: 1; min-width: 0; font-size: 13px; color: #dfe2e7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history .h-artist { flex-shrink: 0; max-width: 42%; font-size: 12px; color: #7b8290; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meta { margin-top: 24px; font-size: 12px; color: #6b7280; }
  .meta a { color: #8a91a0; text-decoration: none; }
  .idle-note { font-size: 14px; color: #9aa3b2; line-height: 1.7; }
  .hidden { display: none !important; }
</style>

<script>
(() => {
  const params = new URLSearchParams(location.search);
  const USER = params.get('user') || 'CHANGE_ME';
  const LB = 'https://api.listenbrainz.org';
  const POLL_MS = 10000; // 进度/歌词客户端外推,轮询只为换歌/暂停等状态,放宽到 10s 省 KV 读额度
  // 主数据源:自建状态中继(Cloudflare Worker+KV,采集器直推,国内可达且不受 LB 抽风影响)。
  // 读 /now(当前)+ /history(历史)。可 ?relay= 覆盖;设 ?relay=off 则退回直连 LB。
  const RELAY = (() => { const r = params.get('relay'); if (r === 'off') return ''; return r || 'https://np.yudaotor.me'; })();
  // 旧的 EdgeOne 中转入口(保留兼容,一般不用)。
  const API_BASE = params.get('api') || '';

  const el = id => document.getElementById(id);

  const artCache = new Map();
  async function artworkFor(artist, title) {
    const key = `art:${artist}|${title}`;
    if (artCache.has(key)) return artCache.get(key);
    try {
      const cached = localStorage.getItem(key);
      if (cached) { artCache.set(key, cached); return cached; }
    } catch (e) {}
    try {
      const q = encodeURIComponent(`${artist} ${title}`);
      const res = await fetch(`https://itunes.apple.com/search?term=${q}&media=music&entity=song&limit=1`);
      const data = await res.json();
      const url100 = data.results && data.results[0] && data.results[0].artworkUrl100;
      const url = url100 ? url100.replace('100x100bb', '600x600bb') : '';
      artCache.set(key, url);
      try { if (url) localStorage.setItem(key, url); } catch (e) {}
      return url;
    } catch (e) { return ''; }
  }

  function relTime(unixSecs) {
    const d = Math.max(0, Math.floor(Date.now() / 1000 - unixSecs));
    if (d < 60) return '刚刚';
    if (d < 3600) return `${Math.floor(d / 60)} 分钟前`;
    if (d < 86400) return `${Math.floor(d / 3600)} 小时前`;
    return `${Math.floor(d / 86400)} 天前`;
  }

  // 统一状态：{title, artist, album, playing, listenedAt, artwork}
  const LAST_KEY = 'np:last';
  function persist(s) { try { localStorage.setItem(LAST_KEY, JSON.stringify(s)); } catch (e) {} }
  function loadPersisted() { try { return JSON.parse(localStorage.getItem(LAST_KEY) || 'null'); } catch (e) { return null; } }
  // 最后一次「看到正在播放」的曲目(带 seenAt)。停播后 LB 只保留满 scrobble 阈值的
  // listen，短播/被我重启清零的曲目不在其中，会让显示回退到更旧的歌。用它兜住：空闲时
  // 若这条比 LB 最新 listen 更近，就继续显示它当「上次播放」。
  const LIVE_KEY = 'np:lastLive';
  function saveLive(s) { try { localStorage.setItem(LIVE_KEY, JSON.stringify({ ...s, seenAt: Date.now() })); } catch (e) {} }
  function loadLive() { try { return JSON.parse(localStorage.getItem(LIVE_KEY) || 'null'); } catch (e) { return null; } }

  let curKey = '';
  async function paint(s) {
    const title = s.title || '未知曲目';
    const artist = s.artist || '';
    // rate=0 → 当前曲目但暂停；rate>0/未知 → 播放中。
    const live = !!s.playing && s.rate !== 0;
    const paused = !!s.playing && s.rate === 0;
    el('status').classList.toggle('live', live);
    el('art').classList.toggle('playing', live);
    el('art-wrap').classList.toggle('playing', live); // 黑胶唱臂落下/抬起
    el('status-text').textContent = live ? '正在播放'
      : paused ? '已暂停'
      : (s.listenedAt ? `上次播放 · ${relTime(s.listenedAt)}` : '最近播放');
    // 设备来源:📱 iPhone / 💻 Mac(采集器打的 source 标)。未知则不显示。
    el('device-icon').textContent = s.source === 'iphone' ? '📱' : s.source === 'mac' ? '💻' : '';
    el('device-icon').title = s.source === 'iphone' ? 'iPhone' : s.source === 'mac' ? 'Mac' : '';
    el('title').textContent = title;
    el('artist').textContent = artist;
    el('album').textContent = s.album || '';
    document.title = s.playing ? `♪ ${title} - ${artist}` : '正在听什么 ♪';

    const key = `${artist}|${title}`;
    const sameTrack = key === curKey;
    curKey = key;
    let art = s.artwork || '';
    if (!sameTrack) {
      const imgEl = el('art');
      if (!art) { imgEl.style.opacity = .3; art = await artworkFor(artist, title); if (key !== curKey) return; }
      if (art) { imgEl.src = art; el('bg').style.backgroundImage = `url("${art}")`; }
      else { imgEl.removeAttribute('src'); el('bg').style.backgroundImage = ''; }
      imgEl.style.opacity = 1;
    }
    setLinks(s.links || {});
    setAccent(s.accent);
    // 歌词只在"有播放位置可驱动"时显示(与进度条同一判据)。iPhone 经 Last.fm 桥接的
    // 播放没有进度数据，歌词无法滚动、只会僵在首行，此时干脆不显示。
    const syncable = !!s.playing && s.durationMs > 0 && typeof s.progressTs === 'number';
    setLyrics(s, syncable, sameTrack);
    persist({ title, artist, album: s.album || '', playing: !!s.playing, listenedAt: s.listenedAt || null, artwork: art, links: s.links || {}, accent: s.accent || '', source: s.source || '' });
    if (live) saveLive({ title, artist, album: s.album || '', artwork: art, links: s.links || {}, accent: s.accent || '' });
  }

  // 按当前封面主色给卡片染色(进度条 + 封面光晕);采集器算好的 hex。同时从它派生
  // 三个和谐色(±旋转色相)喂给流动渐变背景 #flow。
  function hexToHsl(hex) {
    const r = parseInt(hex.slice(1, 3), 16) / 255, g = parseInt(hex.slice(3, 5), 16) / 255, b = parseInt(hex.slice(5, 7), 16) / 255;
    const mx = Math.max(r, g, b), mn = Math.min(r, g, b), d = mx - mn;
    let h = 0; const l = (mx + mn) / 2; const s = d === 0 ? 0 : d / (1 - Math.abs(2 * l - 1));
    if (d !== 0) {
      if (mx === r) h = ((g - b) / d) % 6; else if (mx === g) h = (b - r) / d + 2; else h = (r - g) / d + 4;
      h *= 60; if (h < 0) h += 360;
    }
    return [Math.round(h), Math.round(s * 100), Math.round(l * 100)];
  }
  function setAccent(hex) {
    const root = document.documentElement;
    if (hex && /^#[0-9a-fA-F]{6}$/.test(hex)) {
      root.style.setProperty('--accent', hex);
      const [h, s, l] = hexToHsl(hex);
      const S = Math.min(85, Math.max(48, s)), L = Math.min(62, Math.max(46, l));
      root.style.setProperty('--c1', `hsl(${h} ${S}% ${L}%)`);
      root.style.setProperty('--c2', `hsl(${(h + 38) % 360} ${S}% ${L}%)`);
      root.style.setProperty('--c3', `hsl(${(h + 322) % 360} ${S}% ${L}%)`);
    } else {
      root.style.removeProperty('--accent');
      root.style.removeProperty('--c1'); root.style.removeProperty('--c2'); root.style.removeProperty('--c3');
    }
  }

  // 首屏显示的是本地缓存的上一首：置灰 + 状态显示“更新中…”，拉到实时数据后由 clear 恢复。
  function setStale(on) {
    document.querySelector('.card').classList.toggle('stale', on);
    if (on) { el('status').classList.remove('live'); el('status-text').textContent = '更新中…'; }
  }
  // 首次拉取失败(LB 挂/超时)时:别一直顶着“更新中…”,把缓存那首按“上次播放”正常显示、
  // 取消置灰(后台仍每 6s 悄悄重试,LB 恢复了会自动换成实时)。
  async function revertStale() {
    if (!document.querySelector('.card').classList.contains('stale')) return;
    const p = loadPersisted();
    if (p && p.title) await paint({ ...p, playing: false });
    document.querySelector('.card').classList.remove('stale');
  }

  // 各平台单曲跳转链接（采集器解析后放进 additional_info）。只显示解析到的平台。
  const LINK_IDS = { apple: 'lk-apple', qq: 'lk-qq', netease: 'lk-netease', spotify: 'lk-spotify' };
  function setLinks(links) {
    for (const k in LINK_IDS) {
      const a = el(LINK_IDS[k]); const url = links && links[k];
      if (url) { a.href = url; a.classList.add('show'); }
      else { a.removeAttribute('href'); a.classList.remove('show'); }
    }
  }

  // 最近播放历史条:LB 已完成的 listen(现含 iPhone),去重取带封面的前几首,
  // 缩略图可点(跳该歌的 Apple/网易云)。每 30s 刷一次。
  async function fetchHistory() {
    if (USER === 'CHANGE_ME') return;
    // 优先中继 /history:已是归一化条目 {title,artist,listenedAt,durationMs,url},最多 200 条,
    // 足够覆盖一天。中继不通才回退直连 LB(含翻页)。
    if (RELAY) {
      try {
        const d = await fetchJSON(`${RELAY}/history`, 8000);
        if (d && d.ok && Array.isArray(d.items) && d.items.length) {
          renderHistory(d.items.map(x => ({ title: x.title, artist: x.artist || '', url: x.url || '' })));
          renderTodayStat(d.items.map(x => ({ listenedAt: x.listenedAt || 0, durationMs: x.durationMs })));
          return;
        }
      } catch (e) { /* 中继不通 → LB 兜底 */ }
    }
    try {
      const re = await fetchJSON(`${LB}/1/user/${encodeURIComponent(USER)}/listens?count=100`, 12000);
      const listens = (re.payload && re.payload.listens) || [];
      renderHistory(listens.filter(l => l.track_metadata && l.track_metadata.track_name).map(l => {
        const m = l.track_metadata, ai = m.additional_info || {};
        return { title: m.track_name, artist: m.artist_name || '', url: ai.apple_music_url || ai.netease_url || ai.qq_music_url || '' };
      }));
      const today = await collectTodayListens(listens);
      renderTodayStat(today.map(l => ({ listenedAt: l.listened_at || 0, durationMs: (l.track_metadata && l.track_metadata.additional_info || {}).duration_ms })));
    } catch (e) {}
  }
  // 收集「今天」的全部 listen 用于统计。LB 单次最多 100 条，超过就用 max_ts 往前翻页，
  // 直到翻到早于当天 0 点(或翻完/到上限)。普通日子首页就已跨过 0 点、只 1 次请求；
  // 只有一天听超 100 首才会多翻几页。上限 10 页(1000 首)兜底，防跑飞。
  async function collectTodayListens(firstPage) {
    const midnight = new Date(); midnight.setHours(0, 0, 0, 0);
    const cutoff = Math.floor(midnight.getTime() / 1000);
    const acc = [];
    let page = firstPage;
    for (let i = 0; i < 10; i++) {
      if (!page || !page.length) break;
      for (const l of page) if ((l.listened_at || 0) >= cutoff) acc.push(l);
      const oldest = page[page.length - 1].listened_at || 0;
      if (oldest < cutoff || page.length < 100) break; // 已跨过 0 点 / 没有更早的了
      const re = await fetchJSON(`${LB}/1/user/${encodeURIComponent(USER)}/listens?count=100&max_ts=${oldest}`, 12000);
      page = (re.payload && re.payload.listens) || [];
    }
    return acc;
  }
  // 今日收听统计:输入归一化条目 [{listenedAt(秒), durationMs}]。按本地当天 0 点过滤。
  // 时长优先用各条 durationMs;iPhone 经 Last.fm 桥接的没有时长,用当天已知时长的均值补估、
  // 并标"约",不假装精确。
  function renderTodayStat(items) {
    const stat = el('today-stat');
    if (!stat) return;
    const midnight = new Date(); midnight.setHours(0, 0, 0, 0);
    const cutoff = Math.floor(midnight.getTime() / 1000);
    let count = 0, knownMs = 0, knownN = 0, unknownN = 0;
    for (const it of items) {
      if ((it.listenedAt || 0) < cutoff) continue;
      count++;
      const dm = it.durationMs;
      if (typeof dm === 'number' && dm > 0) { knownMs += dm; knownN++; } else { unknownN++; }
    }
    if (!count) { stat.textContent = ''; return; }
    const avg = knownN ? knownMs / knownN : 210000; // 未知时长的估值:当天均值，无则 3.5 分
    const totalMs = knownMs + unknownN * avg;
    const mins = Math.round(totalMs / 60000);
    const h = Math.floor(mins / 60), mm = mins % 60;
    const dur = h ? `${h} 小时 ${mm} 分` : `${mm} 分`;
    const approx = unknownN > 0 ? '约 ' : '';
    stat.textContent = `今日 · ${count} 首 · ${approx}${dur}`;
  }
  let historySig = ''; // 上次渲染的历史列表签名;内容没变就跳过重建
  function renderHistory(items) {
    const box = el('history'), wrap = el('history-wrap');
    if (!items.length) { wrap.classList.add('hidden'); historySig = ''; updateLayout(); return; }
    // 内容没变就整体跳过——否则每 60s / 每次切回标签都会清零用户滚动位置 + 白重建几百个 DOM。
    const sig = items.map(it => `${it.title}|${it.artist}|${it.url || ''}`).join('\n');
    if (sig === historySig && !wrap.classList.contains('hidden')) return;
    const prevTop = box.scrollTop; // 确需重建时先记住滚动位置,建完还原
    historySig = sig;
    box.textContent = '';
    for (const it of items) {
      const a = document.createElement('a');
      a.title = `${it.title} — ${it.artist}`;
      if (it.url) { a.href = it.url; a.target = '_blank'; a.rel = 'noopener'; }
      const t = document.createElement('span'); t.className = 'h-title'; t.textContent = it.title;
      const ar = document.createElement('span'); ar.className = 'h-artist'; ar.textContent = it.artist;
      a.appendChild(t); a.appendChild(ar); box.appendChild(a);
    }
    box.scrollTop = prevTop;
    wrap.classList.remove('hidden');
    updateLayout();
  }

  function paintIdle(msg) {
    el('status').classList.remove('live');
    el('art').classList.remove('playing');
    el('art-wrap').classList.remove('playing');
    el('status-text').textContent = '暂无播放';
    el('device-icon').textContent = '';
    el('title').textContent = '这会儿很安静';
    el('artist').textContent = msg || '';
    el('album').textContent = '';
    setProgress(null);
    setLyrics(null, false, false);
    setLinks({});
    setAccent('');
    setStale(false);
  }

  // ---- 同步歌词 ----:采集器把网易云的 原文/翻译/罗马音(逐行 LRC)+ 逐字(yrc)塞进
  // additional_info；这里合并成多行 DOM(罗马音上/原文中/翻译下)，在进度条 rAF 里按外推
  // 位置高亮当前行、有逐字则逐字点亮，并整体位移把当前行滚到中间。
  let lrcLines = [];   // [{t, el, words:[{t,el}]|null}]
  let lrcActive = -1;
  // 手动滑动:用户一滚(滚轮/触摸)就暂停自动跟随;停手 LRC_RESUME_MS 后平滑滚回当前行居中。
  let lrcUserScrolling = false, lrcUserTimer = null;
  const LRC_RESUME_MS = 2600;
  const lrcSmooth = () => !window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function lrcScrollActive(smooth) {
    const box = el('lyrics');
    const i = lrcActive >= 0 ? lrcActive : 0;
    const a = lrcLines[i] && lrcLines[i].el;
    if (!a) return;
    const top = Math.max(0, a.offsetTop + a.clientHeight / 2 - box.clientHeight / 2);
    box.scrollTo({ top, behavior: smooth && lrcSmooth() ? 'smooth' : 'auto' });
  }
  function lrcOnUserScroll() {
    lrcUserScrolling = true;
    if (lrcUserTimer) clearTimeout(lrcUserTimer);
    lrcUserTimer = setTimeout(() => { lrcUserScrolling = false; lrcScrollActive(true); }, LRC_RESUME_MS);
  }
  (function bindLyricScroll() {
    const lw = el('lyrics');
    if (!lw) return;
    // 只认真正的用户输入(滚轮/触摸),不听 scroll 事件 → 天然区分「程序自动滚」与「用户滚」。
    lw.addEventListener('wheel', lrcOnUserScroll, { passive: true });
    lw.addEventListener('touchstart', lrcOnUserScroll, { passive: true });
    lw.addEventListener('touchmove', lrcOnUserScroll, { passive: true });
  })();
  function parseLRC(text) {
    const out = [];
    for (const raw of (text || '').split('\n')) {
      const line = raw.trim();
      const tags = [...line.matchAll(/\[(\d{1,2}):(\d{2})(?:[.:](\d{1,3}))?\]/g)];
      if (!tags.length) continue;
      const txt = line.replace(/\[[^\]]*\]/g, '').trim();
      if (!txt) continue; // 跳过纯标签/元信息行([ti:]、[by:] 等)
      for (const m of tags) {
        const frac = m[3] ? +(m[3] + '00').slice(0, 3) : 0;
        out.push({ t: (+m[1] * 60 + +m[2]) * 1000 + frac, text: txt });
      }
    }
    return out.sort((a, b) => a.t - b.t);
  }
  // 网易云 yrc 逐字：每行 [行始ms,行长ms] 后跟若干 (词始ms,词长ms,0)文字
  function parseYRC(text) {
    const out = [];
    for (const raw of (text || '').split('\n')) {
      const head = raw.match(/^\[(\d+),\d+\]/);
      if (!head) continue;
      const words = [];
      const re = /\((\d+),(\d+),\d+\)([^(]*)/g;
      let m;
      while ((m = re.exec(raw))) { if (m[3] !== '') words.push({ t: +m[1], dur: +m[2], text: m[3] }); }
      if (words.length) out.push({ t: +head[1], words });
    }
    return out.sort((a, b) => a.t - b.t);
  }
  // 在有序 [{t,text}] 里找与 t 最接近(容差内)的文本，把翻译/罗马音贴到对应原文行。
  function nearestText(arr, t, tol) {
    let best = '', bestD = tol;
    for (const it of arr) { const d = Math.abs(it.t - t); if (d <= bestD) { bestD = d; best = it.text; } }
    return best;
  }
  function setLyrics(s, playing, sameTrack) {
    const wrap = el('lyrics'), inner = el('lyrics-inner');
    let show = false;
    if (playing && s) { // 只在播放时显示(才可同步)
      if (!sameTrack || !lrcLines.length) {
        const tr = parseLRC(s.lyricsTr), roma = parseLRC(s.lyricsRoma), yrc = parseYRC(s.lyricsYRC);
        const base = yrc.length ? yrc : parseLRC(s.lyrics); // 有逐字用 yrc，否则用原文逐行
        inner.textContent = ''; lrcActive = -1;
        wrap.scrollTop = 0; lrcUserScrolling = false; if (lrcUserTimer) clearTimeout(lrcUserTimer);
        lrcLines = base.map(ln => {
          const line = document.createElement('div'); line.className = 'lrc-line';
          const rm = nearestText(roma, ln.t, 700);
          if (rm) { const d = document.createElement('div'); d.className = 'lrc-roma'; d.textContent = rm; line.appendChild(d); }
          const main = document.createElement('div'); main.className = 'lrc-main';
          let words = null;
          if (ln.words) {
            words = ln.words.map(w => { const sp = document.createElement('span'); sp.className = 'lrc-w'; sp.textContent = w.text; main.appendChild(sp); return { t: w.t, dur: w.dur || 0, el: sp }; });
          } else { main.textContent = ln.text; }
          line.appendChild(main);
          const tt = nearestText(tr, ln.t, 700);
          if (tt) { const d = document.createElement('div'); d.className = 'lrc-tr'; d.textContent = tt; line.appendChild(d); }
          inner.appendChild(line);
          return { t: ln.t, el: line, words };
        });
      }
      show = lrcLines.length > 0;
    }
    wrap.classList.toggle('show', show);
    updateLayout();
  }
  // 有侧栏内容(歌词/历史)时才在宽屏铺两栏；纯空闲(无历史)保持单列居中小卡。
  function updateLayout() {
    const hasSide = el('lyrics').classList.contains('show') || !el('history-wrap').classList.contains('hidden');
    document.querySelector('.card').classList.toggle('two-col', hasSide);
  }
  function syncLyrics(posMs) {
    if (!lrcLines.length) return;
    let idx = -1;
    for (let i = 0; i < lrcLines.length && lrcLines[i].t <= posMs; i++) idx = i;
    if (idx !== lrcActive) {
      if (lrcActive >= 0) lrcLines[lrcActive].el.classList.remove('active');
      lrcActive = idx;
      if (idx >= 0) lrcLines[idx].el.classList.add('active');
      if (!lrcUserScrolling) lrcScrollActive(true); // 手动滑动期间不抢滚动,停手后再回中
    }
    // 逐字渐变填色(只处理当前行):每个词按 (posMs-词始)/词长 算填充比例 0~100%,
    // 平滑扫过。已过的词=100,未到=0,当前词=部分。用 --fill 驱动 CSS 渐变。
    const cur = idx >= 0 ? lrcLines[idx] : null;
    if (cur && cur.words) {
      for (const w of cur.words) {
        let f = w.dur > 0 ? (posMs - w.t) / w.dur : (posMs >= w.t ? 1 : 0);
        f = f < 0 ? 0 : f > 1 ? 1 : f;
        const pct = Math.round(f * 100);
        if (pct !== w._f) { w._f = pct; w.el.style.setProperty('--fill', pct + '%'); }
      }
    }
  }

  // 进度条：以 progressTs 为锚点外推实时位置（连续播放时 elapsedTime 不刷新，
  // 但 progressMs + (now - progressTs) * rate 恒等于当前位置）；rate=0(暂停)冻结。
  // 只在“当前曲目”(playing-now 返回且含时长)时显示，“上次播放”不显示。
  let pb = null;
  function setProgress(s) {
    if (s && s.playing && s.durationMs > 0 && typeof s.progressTs === 'number') {
      pb = {
        durationMs: s.durationMs,
        progressMs: s.progressMs || 0,
        rate: (s.rate == null ? 1 : s.rate),
        progressTs: s.progressTs,        // 兜底(LB 直连路径无 ageMs 时用本机时钟)
        // 抗时钟偏差:优先用服务器锚点年龄 + 本设备相对差(见 frame)。
        baseAgeMs: (typeof s.ageMs === 'number' ? s.ageMs : null),
        fetchedAt: (typeof s.fetchedAt === 'number' ? s.fetchedAt : null),
        fresh: !!s.relayFresh, // 来自中继 KV(准确)→ 不限龄外推;否则 lb 兜底 → 封顶
      };
      el('progress').classList.add('show');
    } else {
      pb = null;
      el('progress').classList.remove('show');
    }
  }
  function fmtTime(ms) {
    const t = Math.max(0, Math.floor(ms / 1000));
    return Math.floor(t / 60) + ':' + String(t % 60).padStart(2, '0');
  }
  let lastSec = -1;
  function frame() {
    if (pb) {
      let pos = pb.progressMs;
      // 锚点真实年龄:优先"服务器算的年龄 + 本设备收到后走过的相对时间"(只用本设备时钟的
      // 相对差,不看绝对时钟 → 跨设备时钟偏差不影响);无 ageMs(LB 直连)才退回本机绝对时钟。
      const ageMs = (pb.baseAgeMs != null && pb.fetchedAt != null)
        ? pb.baseAgeMs + (Date.now() - pb.fetchedAt)
        : (Date.now() - pb.progressTs);
      // kv 锚点(采集器直推、准确)不限龄外推——连播中途采集器不重写锚点也能一路走对,省 KV 写额度;
      // 只有 lb 兜底锚点(可能陈旧)才封顶 90s,防坏锚点把进度条冲到远超实际。
      const cap = pb.fresh ? Infinity : 90000;
      if (pb.rate > 0 && ageMs > 0 && ageMs < cap) pos += ageMs * pb.rate;
      pos = Math.max(0, Math.min(pb.durationMs, pos));
      el('bar-fill').style.width = (pb.durationMs > 0 ? (pos / pb.durationMs) * 100 : 0) + '%';
      const sec = Math.floor(pos / 1000);
      if (sec !== lastSec) {
        lastSec = sec;
        el('t-cur').textContent = fmtTime(pos);
        el('t-dur').textContent = fmtTime(pb.durationMs);
      }
      syncLyrics(pos);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // 带超时的 JSON 拉取:LB(德国)时慢时挂,不加超时会把 tick 卡住、导致“更新中”一直不散。
  async function fetchJSON(url, ms) {
    const ctl = new AbortController();
    const to = setTimeout(() => ctl.abort(), ms || 8000);
    try { return await (await fetch(url, { cache: 'no-store', signal: ctl.signal })).json(); }
    finally { clearTimeout(to); }
  }

  // 取一次状态：优先自建中继 /now(采集器直推、国内可达、不受 LB 抽风影响);中继本身
  // 连不上(极端:CF 被墙)才回退直连 LB。返回 状态对象 / {empty:true} / null。
  async function fetchState() {
    if (RELAY) {
      try {
        const d = await fetchJSON(`${RELAY}/now`, 4000);
        if (d && d.ok && !d.empty && d.title) {
          return { title: d.title, artist: d.artist, album: d.album, playing: d.playing, listenedAt: d.listenedAt,
            artwork: d.artwork || '', accent: d.accent || '', source: d.device || '',
            lyrics: d.lyrics || '', lyricsTr: d.lyricsTr || '', lyricsRoma: d.lyricsRoma || '', lyricsYRC: d.lyricsYRC || '',
            durationMs: d.durationMs, progressMs: d.progressMs, progressTs: d.progressTs, rate: d.rate,
            // 服务器算的锚点年龄 + 本设备收到的时刻:据此外推不依赖本设备绝对时钟(消除跨设备时钟偏差)。
            ageMs: (typeof d.ageMs === 'number' ? d.ageMs : null), fetchedAt: Date.now(), relayFresh: d.source === 'kv',
            links: d.links || {} };
        }
        if (d && d.empty) return { empty: true };
      } catch (e) { /* 中继不通 → 落到下面 LB 兜底 */ }
    }
    if (API_BASE) {
      try {
        // EdgeOne 在国内会 401/慢，加 2.5s 超时快速回退直连 LB，别让它拖慢每次轮询。
        const ctl = new AbortController();
        const to = setTimeout(() => ctl.abort(), 2500);
        const r = await fetch(`${API_BASE}/now`, { cache: 'no-store', signal: ctl.signal }).finally(() => clearTimeout(to));
        if (r.ok) {
          const d = await r.json();
          if (d && d.ok && !d.empty && d.title) {
            return { title: d.title, artist: d.artist, album: d.album, playing: d.playing, listenedAt: d.listenedAt, artwork: d.artwork,
              accent: d.accentColor, source: d.device || '', lyrics: d.lyrics || '', lyricsTr: d.lyricsTr || '', lyricsRoma: d.lyricsRoma || '', lyricsYRC: d.lyricsYRC || '',
              durationMs: d.durationMs, progressMs: d.progressMs, progressTs: d.progressTs, rate: d.rate,
              links: { apple: d.appleUrl, qq: d.qqUrl, netease: d.neteaseUrl, spotify: d.spotifyUrl } };
          }
          if (d && d.empty) return { empty: true };
        }
      } catch (e) {}
    }
    try {
      // 采集器把网易云封面(国内可加载)塞进了 additional_info.cover_url；优先用它，
      // 苹果 mzstatic 在国内已无 CDN 节点、加载不出。
      const fromLB = (l, playing, listenedAt) => {
        const m = l.track_metadata || {};
        const ai = m.additional_info || {};
        const num = v => (typeof v === 'number' ? v : null);
        return { title: m.track_name, artist: m.artist_name, album: m.release_name, playing, listenedAt,
          artwork: ai.cover_url || '', accent: ai.accent_color || '', source: ai.source || '',
          lyrics: ai.lyrics || '', lyricsTr: ai.lyrics_tr || '', lyricsRoma: ai.lyrics_roma || '', lyricsYRC: ai.lyrics_yrc || '',
          links: { apple: ai.apple_music_url, qq: ai.qq_music_url, netease: ai.netease_url, spotify: ai.spotify_url },
          durationMs: num(ai.duration_ms), progressMs: num(ai.progress_ms), progressTs: num(ai.progress_ts), rate: num(ai.playback_rate) };
      };
      const pn = await fetchJSON(`${LB}/1/user/${encodeURIComponent(USER)}/playing-now`, 8000);
      const now = pn.payload && pn.payload.listens && pn.payload.listens[0];
      if (now) return fromLB(now, true, null);
      const re = await fetchJSON(`${LB}/1/user/${encodeURIComponent(USER)}/listens?count=1`, 8000);
      const last = re.payload && re.payload.listens && re.payload.listens[0];
      if (last) return fromLB(last, false, last.listened_at);
      return { empty: true };
    } catch (e) { return null; }
  }

  let everRendered = false;
  async function tick() {
    if (USER === 'CHANGE_ME') { paintIdle('页面未配置：URL 需带 ?user=<ListenBrainz用户名>'); return; }
    const s = await fetchState();
    // 空闲态(拿到的是 LB 的“上次播放”而非正在播放)：若我们最近看到过一首正在播放的、
    // 且比这条 LB listen 更近，就显示那首——避免回退到更旧、只因它满了 scrobble 阈值的歌。
    if (s && !s.empty && !s.playing) {
      const lv = loadLive();
      if (lv && lv.seenAt && `${lv.artist}|${lv.title}` !== `${s.artist}|${s.title}`
          && (!s.listenedAt || lv.seenAt / 1000 > s.listenedAt)) {
        await paint({ title: lv.title, artist: lv.artist, album: lv.album, artwork: lv.artwork,
          links: lv.links, accent: lv.accent, playing: false, listenedAt: Math.floor(lv.seenAt / 1000) });
        setProgress(null); setStale(false); everRendered = true; return;
      }
    }
    if (s && !s.empty) { await paint(s); setProgress(s); setStale(false); everRendered = true; return; }
    if (s && s.empty) { setProgress(null); if (!everRendered) paintIdle('还没有任何收听记录'); else await revertStale(); return; }
    // s === null：数据源都拿不到（LB 抽风等）→ 保留当前显示，不清屏；
    // 但首屏的“更新中…”不能一直挂着，把缓存那首按上次播放正常显示（后台继续重试）。
    if (!everRendered) paintIdle('连接中…稍后自动重试'); else await revertStale();
  }

  // 黑胶 / 方形 切换(记忆到 localStorage，右上角小圆钮)。
  (function initVinyl() {
    const wrap = el('art-wrap'), btn = el('vinyl-toggle');
    const apply = on => { wrap.classList.toggle('vinyl', on); btn.classList.toggle('on', on); };
    apply(localStorage.getItem('np:vinyl') !== '0'); // 默认黑胶;仅当用户显式关过('0')才方形
    btn.addEventListener('click', () => {
      const on = !wrap.classList.contains('vinyl');
      apply(on);
      try { localStorage.setItem('np:vinyl', on ? '1' : '0'); } catch (e) {}
    });
  })();

  // 首屏：先用本地缓存的上一首秒渲染（不空等），再拉最新。
  const persisted = loadPersisted();
  if (persisted && persisted.title) {
    everRendered = true; paint(persisted); setStale(true);
    // 兜底:LB 若全程卡住(所有拉取都超时),“更新中…”最多挂 10 秒就回落到缓存正常态,
    // 别让用户干等——后台每 6s 仍在悄悄重试,恢复了自动换实时。
    setTimeout(revertStale, 10000);
  } else { paintIdle('连接中…'); }

  tick();
  // 历史(74KB)延后,先让实时 now-playing 那条小请求抢到连接、卡片更快出。
  setTimeout(fetchHistory, 800);
  setInterval(() => { if (!document.hidden) tick(); }, POLL_MS);
  setInterval(() => { if (!document.hidden) fetchHistory(); }, 60000);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) { tick(); fetchHistory(); } });

  // Service Worker：缓存页面壳，重复访问秒开（不阻塞首屏）。
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
