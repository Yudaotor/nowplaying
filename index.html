<script>
(() => {
  const params = new URLSearchParams(location.search);
  const USER = params.get('user') || 'CHANGE_ME';
  const LB = 'https://api.listenbrainz.org';
  const POLL_MS = 10000; // 进度/歌词客户端外推,轮询只为换歌/暂停等状态,放宽到 10s 省 KV 读额度
  // 主数据源:自建状态中继(Cloudflare Worker+KV,采集器直推,国内可达且不受 LB 抽风影响)。
  // 读 /now(当前)+ /history(历史)。可 ?relay= 覆盖;设 ?relay=off 则退回直连 LB。
  const RELAY = (() => { const r = params.get('relay'); if (r === 'off') return ''; return r || 'https://np.yudaotor.me'; })();

  const el = id => document.getElementById(id);

  // ---- 中英双语(2026-07-21新增) ----
  // 纯 vanilla JS,没有任何框架托底的响应式机制——语言切换时不会有任何东西"自动"
  // 重新渲染,必须显式做。这里踩过跟 Lyrimuse(Swift App)那边 SwiftUI 一模一样的坑:
  // 历史/留言这类内容各自有"内容没变就跳过重建"的签名去重(historySig/comments 内部的
  // sig),只切语言、不动数据的话签名对得上,会直接被这个优化短路掉,文字停在切换前的
  // 语言——不是"忘了重新渲染",是重新渲染了但被自己的去重逻辑拦住了。解法不是到处加
  // "强制重渲染"的旁路,而是把 currentLang 直接拌进签名本身:语言一变,签名天然对不上,
  // 去重逻辑自己就会放行重建,不需要额外维护一套"记得清空签名"的清单。
  const STRINGS = {
    zh: {
      docTitleIdle: '正在听什么 ♪',
      moreSettings: '更多设置', expandSettings: '展开设置',
      switchTheme: '切换主题',
      vinylToggleTitle: '黑胶 / 方形 切换', vinylToggleAria: '黑胶/方形切换',
      fsToggleTitle: '沉浸 / 全屏模式', fsToggleAria: '沉浸全屏模式',
      themeAuto: '氛围', themeLight: '浅色', themeTitlePrefix: '主题：', themeTitleSuffix: '（点击切换）',
      previewAria: '试听 30 秒', previewTitle: '试听 30 秒（iTunes 预览）',
      recentPlays: '最近播放', colTitle: '歌名', colArtist: '歌手', col30d: '30天',
      comments: '留言', namePlaceholder: '昵称(可选)', textPlaceholder: '留句话…', send: '发送',
      noComments: '还没有留言,来写第一条吧', anonymous: '匿名',
      topArtists: '历史播放 Top10 歌手',
      reactionsHint: '觉得有趣可以点个赞哦',
      visitorCountTitle: '同一浏览器只计一次;清除缓存/换浏览器/无痕模式会重新计入一次',
      justNow: '刚刚', minutesAgo: n => `${n} 分钟前`, hoursAgo: n => `${n} 小时前`, daysAgo: n => `${n} 天前`,
      unknownTrack: '未知曲目', nowPlaying: '他正在播放', paused: '已暂停',
      lastPlayed: t => `上次播放 · ${t}`, recentlyPlayed: '最近播放',
      updating: '更新中…',
      sourceNetease: '网易云音乐', sourceQQ: 'QQ音乐', sourceKugou: '酷狗音乐', sourceLRCLIB: 'LRCLIB',
      coverLyricsVia: s => `封面歌词来自${s}`, coverVia: s => `封面来自${s}`, lyricsVia: s => `歌词来自${s}`,
      playedNTimes: n => `近30天播放 ${n} 次`,
      hoursMins: (h, m) => `${h} 小时 ${m} 分`, minsOnly: m => `${m} 分`, approx: '约 ',
      todayStat: (count, dur) => `今日 · ${count} 首 · ${dur}`,
      earlier: '更早',
      nothingPlaying: '暂无播放', quietRightNow: '这会儿很安静',
      notConfigured: '页面未配置：URL 需带 ?user=<ListenBrainz用户名>',
      noListensYet: '还没有任何收听记录',
      connectingRetry: '连接中…稍后自动重试', connecting: '连接中…',
      pageViews: n => `页面访问次数：${n}`,
      artistPlayCount: (name, n) => `${name} · ${n} 次播放`,
    },
    en: {
      docTitleIdle: 'Now Playing ♪',
      moreSettings: 'More settings', expandSettings: 'Expand settings',
      switchTheme: 'Switch theme',
      vinylToggleTitle: 'Vinyl / Square toggle', vinylToggleAria: 'Vinyl/Square toggle',
      fsToggleTitle: 'Immersive / Fullscreen mode', fsToggleAria: 'Immersive fullscreen mode',
      themeAuto: 'Ambient', themeLight: 'Light', themeTitlePrefix: 'Theme: ', themeTitleSuffix: ' (click to switch)',
      previewAria: '30s Preview', previewTitle: '30-second preview (via iTunes)',
      recentPlays: 'Recent Plays', colTitle: 'Title', colArtist: 'Artist', col30d: '30d',
      comments: 'Comments', namePlaceholder: 'Name', textPlaceholder: 'Say something…', send: 'Send',
      noComments: 'No comments yet — be the first!', anonymous: 'Anonymous',
      topArtists: 'Top 10 Artists (All Time)',
      reactionsHint: 'Tap ❤️ if you enjoy this',
      visitorCountTitle: 'Counted once per browser; clearing cache/switching browsers/private mode counts again',
      justNow: 'just now', minutesAgo: n => `${n}m ago`, hoursAgo: n => `${n}h ago`, daysAgo: n => `${n}d ago`,
      unknownTrack: 'Unknown Track', nowPlaying: 'Now Playing', paused: 'Paused',
      lastPlayed: t => `Last played · ${t}`, recentlyPlayed: 'Recently played',
      updating: 'Updating…',
      sourceNetease: 'NetEase Cloud Music', sourceQQ: 'QQ Music', sourceKugou: 'Kugou Music', sourceLRCLIB: 'LRCLIB',
      coverLyricsVia: s => `Cover & lyrics via ${s}`, coverVia: s => `Cover via ${s}`, lyricsVia: s => `Lyrics via ${s}`,
      playedNTimes: n => `${n} plays in the last 30 days`,
      hoursMins: (h, m) => `${h}h ${m}m`, minsOnly: m => `${m}m`, approx: '~ ',
      todayStat: (count, dur) => `Today · ${count} tracks · ${dur}`,
      earlier: 'Earlier',
      nothingPlaying: 'Nothing playing', quietRightNow: "It's quiet right now",
      notConfigured: 'Page not configured: URL needs ?user=<ListenBrainz username>',
      noListensYet: 'No listening history yet',
      connectingRetry: 'Connecting… will retry automatically', connecting: 'Connecting…',
      pageViews: n => `Page views: ${n}`,
      artistPlayCount: (name, n) => `${name} · ${n} plays`,
    },
  };
  const LANG_KEY = 'npLang';
  function detectLang() {
    try {
      const saved = localStorage.getItem(LANG_KEY);
      if (saved === 'zh' || saved === 'en') return saved;
    } catch (e) {}
    return (navigator.language || 'zh').toLowerCase().startsWith('zh') ? 'zh' : 'en';
  }
  let currentLang = detectLang();
  function t(key, ...args) {
    const entry = (STRINGS[currentLang] || STRINGS.zh)[key];
    if (entry === undefined) return key;
    return typeof entry === 'function' ? entry(...args) : entry;
  }
  function applyStaticI18n() {
    document.querySelectorAll('[data-i18n]').forEach(e => { e.textContent = t(e.dataset.i18n); });
    document.querySelectorAll('[data-i18n-title]').forEach(e => { e.title = t(e.dataset.i18nTitle); });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(e => { e.placeholder = t(e.dataset.i18nPlaceholder); });
    document.querySelectorAll('[data-i18n-aria]').forEach(e => { e.setAttribute('aria-label', t(e.dataset.i18nAria)); });
  }
  // 语言切换时需要显式重新触发的几处:paint()/renderHistory() 读的都是各自最近一次
  // 缓存下来的真实数据重画,不是空等下一轮轮询;__fetchComments/__fetchReactions 复用
  // 现成的轮询函数——它们各自的"内容没变就跳过"签名已经拌进了 currentLang,这次一定
  // 会认为签名变了、老老实实重建。今日统计(renderTodayStat)不在这份清单里——它的输入
  // 不是简单缓存了一份就能重放,下一轮 60s 自动刷新会自然带上新语言,这个不到 1 分钟的
  // 延迟可以接受,没有为了这一个次要统计信息单独再维护一套"记住最近一次输入"的机制。
  function setLang(lang) {
    currentLang = lang;
    try { localStorage.setItem(LANG_KEY, lang); } catch (e) {}
    applyStaticI18n();
    if (window.__refreshLangDependent) window.__refreshLangDependent();
  }

  // iTunes 搜索完全没做专辑/版本区分,直接信排序第一条——查询曲名带"live"/"现场"/
  // "演唱会"这类标记时(演唱会/现场版常见写法),第一条结果反而常是同名歌曲的录音室版
  // (iTunes 排序对结构复杂的标题,比如把好几首歌名拼在一起的现场串烧"Medley: A/B/C/D
  // (Live)",经常连关键词都对不完整、只能命中其中一首歌,选出的是这首歌全网最热门的
  // 版本——录音室版通常比某场具体演唱会的现场版更热门,反而排到前面)。这里在候选里
  // 找一个至少标了"live"的,起码比塞一张完全不同年代的录音室专辑封面更贴题(实测坐实:
  // 周杰伦"Medley: 星晴/回到过去/最后的战役/爱我别走 (Live)",原本 limit=1 只能拿到
  // 第一条《八度空间》2002 录音室版《最后的战役》封面,多要几条、里面其实有 Live 版本)。
  // artworkFor/previewFor 共用这份挑选逻辑,不各自维护一份——避免两处以后各自改出分歧。
  function pickITunesResult(results, title) {
    if (!results || !results.length) return null;
    if (/live|现场|演唱会/i.test(title)) {
      const live = results.find(r => /live|现场|演唱会/i.test(`${r.trackName} ${r.collectionName}`));
      if (live) return live;
    }
    return results[0];
  }

  const artCache = new Map();
  async function artworkFor(artist, title) {
    const key = `art:${artist}|${title}`;
    if (artCache.has(key)) return artCache.get(key);
    try {
      const cached = localStorage.getItem(key);
      if (cached) { artCache.set(key, cached); return cached; }
    } catch (e) {}
    try {
      const q = encodeURIComponent(`${artist} ${title}`);
      const res = await fetch(`https://itunes.apple.com/search?term=${q}&media=music&entity=song&limit=5`);
      const data = await res.json();
      const result = pickITunesResult(data.results, title);
      const url100 = result && result.artworkUrl100;
      const url = url100 ? url100.replace('100x100bb', '600x600bb') : '';
      artCache.set(key, url);
      try { if (url) localStorage.setItem(key, url); } catch (e) {}
      return url;
    } catch (e) { return ''; }
  }

  // 30 秒试听:iTunes 每首歌带 previewUrl(与封面查询同源、免 key)。封面角放▶钮,点了才
  // 加载播放(自动播放策略要求用户手势触发);切歌自动停。preview 可能非同版本,取不到就藏钮。
  const previewCache = new Map();
  async function previewFor(artist, title) {
    const key = `prev:${artist}|${title}`;
    if (previewCache.has(key)) return previewCache.get(key);
    try { const c = localStorage.getItem(key); if (c !== null) { previewCache.set(key, c); return c; } } catch (e) {}
    try {
      const q = encodeURIComponent(`${artist} ${title}`);
      const res = await fetch(`https://itunes.apple.com/search?term=${q}&media=music&entity=song&limit=5`);
      const data = await res.json();
      const result = pickITunesResult(data.results, title);
      const url = (result && result.previewUrl) || '';
      previewCache.set(key, url);
      try { if (url) localStorage.setItem(key, url); } catch (e) {}
      return url;
    } catch (e) { return ''; }
  }
  let curPreviewUrl = '';
  function resetPreview() {
    const a = el('preview-audio'), btn = el('preview-btn');
    if (a) { a.pause(); a.removeAttribute('src'); try { a.load(); } catch (e) {} }
    if (btn) { btn.classList.remove('playing'); btn.classList.add('hidden'); btn.textContent = '▶'; }
    curPreviewUrl = '';
  }
  async function loadPreview(artist, title, key) {
    const url = await previewFor(artist, title);
    if (key !== curKey) return; // 切歌了,丢弃这次结果
    curPreviewUrl = url;
    const btn = el('preview-btn');
    if (btn) btn.classList.toggle('hidden', !url);
  }

  function relTime(unixSecs) {
    const d = Math.max(0, Math.floor(Date.now() / 1000 - unixSecs));
    if (d < 60) return t('justNow');
    if (d < 3600) return t('minutesAgo', Math.floor(d / 60));
    if (d < 86400) return t('hoursAgo', Math.floor(d / 3600));
    return t('daysAgo', Math.floor(d / 86400));
  }

  // 统一状态：{title, artist, album, playing, listenedAt, artwork}
  const LAST_KEY = 'np:last';
  function persist(s) { try { localStorage.setItem(LAST_KEY, JSON.stringify(s)); } catch (e) {} }
  function loadPersisted() { try { return JSON.parse(localStorage.getItem(LAST_KEY) || 'null'); } catch (e) { return null; } }
  // 最近一次渲染的历史列表(裁到 40 条):首屏秒渲染用,让 history-wrap/两栏版式在
  // fetchHistory() 落地前就已经是最终形状,而不是从隐藏态弹出再把卡片撑宽。
  const HIST_LAST_KEY = 'np:lastHistory';
  function persistHistory(items) { try { localStorage.setItem(HIST_LAST_KEY, JSON.stringify(items.slice(0, 40))); } catch (e) {} }
  function loadPersistedHistory() { try { return JSON.parse(localStorage.getItem(HIST_LAST_KEY) || 'null'); } catch (e) { return null; } }
  // 最后一次「看到正在播放」的曲目(带 seenAt)。停播后 LB 只保留满 scrobble 阈值的
  // listen，短播/被我重启清零的曲目不在其中，会让显示回退到更旧的歌。用它兜住：空闲时
  // 若这条比 LB 最新 listen 更近，就继续显示它当「上次播放」。
  const LIVE_KEY = 'np:lastLive';
  function saveLive(s) { try { localStorage.setItem(LIVE_KEY, JSON.stringify({ ...s, seenAt: Date.now() })); } catch (e) {} }
  function loadLive() { try { return JSON.parse(localStorage.getItem(LIVE_KEY) || 'null'); } catch (e) { return null; } }

  // 可选内容模块开关(2026-07-16新增):站长可在后端配置关掉历史/留言/表情/访客计数/
  // Top10歌手 五个模块中的任意几个,配置随 GET {RELAY}/now 的 modules 字段下发(见
  // fetchState()/tick())。先用 localStorage 缓存的上一份配置铺一次(首屏不用空等真实
  // 网络响应),等 tick() 拿到新配置再刷新一遍——跟 np:last/np:lastHistory 同一套
  // persist/load 写法。缺失的键(字段还没上线/单个键没写)一律按启用处理,只有显式 false
  // 才算禁用,新模块/后端还没跟上时不会误伤现有站点。
  const MODULES_KEY = 'np:modules';
  function persistModules(cfg) { try { localStorage.setItem(MODULES_KEY, JSON.stringify(cfg)); } catch (e) {} }
  function loadPersistedModules() { try { return JSON.parse(localStorage.getItem(MODULES_KEY) || 'null'); } catch (e) { return null; } }
  function normalizeModules(raw) {
    const enabled = key => !raw || raw[key] !== false;
    return {
      history: enabled('history'), comments: enabled('comments'), reactions: enabled('reactions'),
      visitorCount: enabled('visitorCount'), topArtists: enabled('topArtists'),
    };
  }
  let moduleConfig = normalizeModules(loadPersistedModules());
  // 禁用的模块强制隐藏(.hidden);启用的模块这里绝不主动摘掉 hidden——那是各模块自己
  // 内容驱动逻辑的地盘(比如 renderHistory 空列表时自己隐藏、initTopArtists/
  // initVisitorCounter 只在异步拿到非空结果后才显示),这里跟它们抢摘 hidden 会把"真的
  // 没内容"的模块强行摆出来,详见文件顶部这次改动的设计说明。
  function applyModuleVisibility() {
    const wrapIds = {
      history: 'history-wrap', comments: 'comments-wrap', topArtists: 'top-artists-wrap',
      reactions: 'reactions-footer', visitorCount: 'visitor-count',
    };
    for (const key in wrapIds) {
      const elm = el(wrapIds[key]);
      if (elm && !moduleConfig[key]) elm.classList.add('hidden');
    }
    updateLayout();
  }
  applyModuleVisibility();

  let curKey = '';
  let lastAppliedArt = ''; // 当前实际显示在 #art 上的封面 URL,见 paint() 里换歌封面纠正逻辑
  // 已经为这个 key 尝试过客户端 iTunes 兜底(不管拿没拿到结果),不用重复请求——单独用
  // 这个变量记账、不能看 sameTrack:首屏"先用本地缓存秒渲染一次、真实数据紧接着又渲染
  // 同一首歌"这个时序下,第二次调用 sameTrack 已经是 true 了,如果兜底请求也挂在
  // sameTrack 上,会导致缓存渲染那次刚请求到的兜底图,被紧接着的真实数据渲染(服务端仍
  // 无封面)误判成"这首歌不用再管封面"而跳过更新,然后又被下面"服务端值跟当前显示值不
  // 一样就同步"的逻辑当成"服务端确认没有"直接清空——图片等于先显示了一下又被自己清掉
  // (实测坐实:2026-07-10)。
  let fallbackTriedKey = '';
  // 换成新曲目、这一轮暂时没封面(服务端 enrich 还没跑完、客户端 iTunes 兜底也没搜到)时,
  // 不立刻拍黑清空,先记一个延迟清空定时器——多等一轮 poll(POLL_MS + 余量),真封面几乎
  // 总能在这段时间内从服务端回来直接覆盖掉,清空分支只在真等满了还是没有时才兜底触发。
  let clearArtTimer = null;
  let artResolvedKey = ''; // 已经拿到过非空封面的 key,配合 clearArtTimer 判断是否该真的清空
  async function paint(s) {
    const title = s.title || t('unknownTrack');
    const artist = s.artist || '';
    const live = !!s.playing && s.rate !== 0;
    // 已暂停:不在播放、但服务端标注这仍是 Mac/iPhone 此刻活跃的曲目(current===true,见
    // relayState()/fetchState() 注释)——暂停时服务端发的是 playing:false,不是 playing:true
    // 加 rate:0,所以不能靠 s.playing 判断"是否暂停",得看 current。current 不是 true 时说明
    // 已经回退到纯历史 fallback(退出播放器后显示的"上次播放"),不该显示"已暂停"。
    const paused = !live && s.current === true;
    el('status').classList.remove('idle', 'connecting');
    el('status').classList.toggle('live', live);
    el('art').classList.toggle('playing', live);
    el('art-wrap').classList.toggle('playing', live); // 黑胶唱臂落下/抬起
    if (window.setVinylPlaying) window.setVinylPlaying(live); // 黑胶转速缓动(WAAPI)
    el('progress').classList.toggle('is-live', live); // 播放头呼吸光晕只在真正播放时出现
    el('status-text').textContent = live ? t('nowPlaying')
      : paused ? t('paused')
      : (s.listenedAt ? t('lastPlayed', relTime(s.listenedAt)) : t('recentlyPlayed'));
    // 设备来源:笔记本=Mac / 手机=iPhone 线描图标(同款 DEV_ICON,currentColor 跟随状态胶囊:播放绿/暂停灰)。未知不显示。
    el('device-icon').innerHTML = DEV_ICON[s.source] || '';
    el('device-icon').title = s.source === 'iphone' ? 'iPhone' : s.source === 'mac' ? 'Mac' : '';
    el('title').textContent = title;
    el('artist').textContent = artist;
    el('album').textContent = s.album || '';
    document.title = s.playing ? `♪ ${title} - ${artist}` : t('docTitleIdle');

    const key = `${artist}|${title}`;
    const sameTrack = key === curKey;
    curKey = key;
    let art = s.artwork || '';
    const imgEl = el('art');
    if (!sameTrack) {
      resetPreview();
      loadPreview(artist, title, key);
    }
    // 换歌瞬间(或首屏缓存渲染那次)采集器的 enrich(网易云/QQ 解析)常常还没跑完,art 这时
    // 是空的,用客户端 iTunes 兜底占位——按 fallbackTriedKey(不是 sameTrack)记账只试一次,
    // 见上面变量声明处注释。
    if (!art && fallbackTriedKey !== key) {
      fallbackTriedKey = key;
      imgEl.style.opacity = .3;
      art = await artworkFor(artist, title);
      if (key !== curKey) return;
    }
    // iTunes 搜索没做专辑区分,同一首歌撞上合集/精选辑重发时经常选错封面(实测坐实:Smooth
    // Criminal 就被兜底选中了合集版封面)。真封面几秒后从服务端 poll 回来时必须能纠正过来,
    // 不能被"同一首歌不再更新图"的判断卡死——所以拿到非空封面时不看 sameTrack,只看"这轮
    // 拿到的跟当前实际显示的是不是同一张"。但服务端汇报"这首歌没有封面"(art 为空)时,只有
    // 真的换了新曲目才清空——同一首歌服务端还没解析出来,不该把已经在展示的图(不管是服务端
    // 给的还是客户端兜底的)撤掉(实测坐实:2026-07-10,这条清空分支曾经把刚兜底成功的图冲掉)。
    if (art) {
      if (art !== lastAppliedArt) {
        imgEl.src = art; el('bg').style.backgroundImage = `url("${art}")`;
        lastAppliedArt = art;
      }
      artResolvedKey = key;
      if (clearArtTimer) { clearTimeout(clearArtTimer); clearArtTimer = null; }
    } else if (!sameTrack) {
      // 刚换的这首暂时没封面:先留着上一首的封面/背景不动,给服务端一轮 poll 的时间把真
      // 封面带回来(上面 art 非空分支不看 sameTrack,拿到就会立刻覆盖)——避免"切歌瞬间
      // 拍黑、几秒后又突然恢复"这种视觉突兀(实测坐实:2026-07-11,POLL_MS=10s 时旧逻辑
      // 换歌立刻清空,期间背景/封面直接露出纯黑底)。真等满一轮 poll 还是没有才兜底清空。
      // 每次真的换新曲目(!sameTrack 只在 key 变化的那一次为真)都重新起一个定时器、顶掉
      // 上一个还没触发的——不会因为快速连续切歌而漏排上新曲目自己的兜底清空。
      if (clearArtTimer) clearTimeout(clearArtTimer);
      const forKey = key;
      clearArtTimer = setTimeout(() => {
        clearArtTimer = null;
        if (curKey === forKey && artResolvedKey !== forKey) {
          imgEl.removeAttribute('src'); el('bg').style.backgroundImage = '';
          lastAppliedArt = '';
        }
      }, POLL_MS + 2000);
    }
    imgEl.style.opacity = 1;
    setLinks(s.links || {});
    setAccent(s.accent);
    renderSourceMeta(s.coverSource, s.lyricsSource);
    // 歌词只在"有播放位置可驱动"时显示(与进度条同一判据)。iPhone 经 Last.fm 桥接的
    // 播放没有进度数据，歌词无法滚动、只会僵在首行，此时干脆不显示。
    const syncable = !!s.playing && s.durationMs > 0 && typeof s.progressTs === 'number';
    setLyrics(s, syncable, sameTrack);
    // 一并缓存进度/歌词原文用的字段,好让下次开页时进度条和歌词面板也能跟着秒渲染
    // 出最终形状(而不是只有标题/封面提前铺好,进度条和歌词仍要等 tick() 落地才弹出)。
    persist({ title, artist, album: s.album || '', playing: !!s.playing, listenedAt: s.listenedAt || null, artwork: art, links: s.links || {}, accent: s.accent || '', source: s.source || '',
      lyrics: s.lyrics || '', lyricsTr: s.lyricsTr || '', lyricsRoma: s.lyricsRoma || '', lyricsYRC: s.lyricsYRC || '',
      coverSource: s.coverSource || '', lyricsSource: s.lyricsSource || '',
      durationMs: s.durationMs || 0, progressMs: s.progressMs || 0, progressTs: (typeof s.progressTs === 'number' ? s.progressTs : null),
      rate: (s.rate == null ? null : s.rate), ageMs: (typeof s.ageMs === 'number' ? s.ageMs : null), fetchedAt: (typeof s.fetchedAt === 'number' ? s.fetchedAt : null),
      relayFresh: !!s.relayFresh,
      // 写入这份快照时的墙钟时间——不是"这首歌几时收听完"(listenedAt,当时若还在播放、
      // 尚未形成一条完成收听,这个字段本身就是空的),而是"这条本地缓存本身多久没更新了"。
      // revertStale() 兜底展示旧缓存时靠它撑出真实的"距今多久",见那边注释。
      persistedAt: Date.now() });
    if (live) saveLive({ title, artist, album: s.album || '', artwork: art, links: s.links || {}, accent: s.accent || '' });
  }

  // 按当前封面主色给卡片染色(进度条 + 封面光晕);采集器算好的 hex。同时从它派生
  // 三个和谐色(±旋转色相)喂给流动渐变背景 #flow。
  function hexToHsl(hex) {
    const r = parseInt(hex.slice(1, 3), 16) / 255, g = parseInt(hex.slice(3, 5), 16) / 255, b = parseInt(hex.slice(5, 7), 16) / 255;
    const mx = Math.max(r, g, b), mn = Math.min(r, g, b), d = mx - mn;
    let h = 0; const l = (mx + mn) / 2; const s = d === 0 ? 0 : d / (1 - Math.abs(2 * l - 1));
    if (d !== 0) {
      if (mx === r) h = ((g - b) / d) % 6; else if (mx === g) h = (b - r) / d + 2; else h = (r - g) / d + 4;
      h *= 60; if (h < 0) h += 360;
    }
    return [Math.round(h), Math.round(s * 100), Math.round(l * 100)];
  }
  // flow-a/flow-b 交替担任"当前显示"的色斑层;flowOn 记录哪一层现在亮着(0=a,1=b)。
  // 同一个 hex 重复调用(同曲每次 poll 都会来一次)不重新触发交叉淡入淡出。
  let flowOn = 0, lastAccentHex = '';
  function setAccent(hex) {
    const root = document.documentElement;
    if (hex && /^#[0-9a-fA-F]{6}$/.test(hex)) {
      root.style.setProperty('--accent', hex);
      if (hex === lastAccentHex) return;
      lastAccentHex = hex;
      const [h, s, l] = hexToHsl(hex);
      const S = Math.min(85, Math.max(48, s)), L = Math.min(62, Math.max(46, l));
      const c1 = `hsl(${h} ${S}% ${L}%)`, c2 = `hsl(${(h + 38) % 360} ${S}% ${L}%)`, c3 = `hsl(${(h + 322) % 360} ${S}% ${L}%)`;
      const next = el(flowOn ? 'flow-a' : 'flow-b'), prev = el(flowOn ? 'flow-b' : 'flow-a');
      next.style.setProperty('--fc1', c1); next.style.setProperty('--fc2', c2); next.style.setProperty('--fc3', c3);
      next.classList.add('on');
      prev.classList.remove('on');
      flowOn = flowOn ? 0 : 1;
    } else {
      lastAccentHex = '';
      root.style.removeProperty('--accent');
      el('flow-a').classList.remove('on'); el('flow-b').classList.remove('on');
    }
  }

  // 首屏显示的是本地缓存的上一首：置灰 + 状态显示“更新中…”，拉到实时数据后由 clear 恢复。
  function setStale(on) {
    document.querySelector('.card').classList.toggle('stale', on);
    if (on) { el('status').classList.remove('live'); el('status-text').textContent = t('updating'); }
  }
  // 首次拉取失败(LB 挂/超时)时:别一直顶着“更新中…”,把缓存那首按“上次播放”正常显示、
  // 取消置灰(后台仍每 6s 悄悄重试,LB 恢复了会自动换成实时)。
  async function revertStale() {
    if (!document.querySelector('.card').classList.contains('stale')) return;
    const p = loadPersisted();
    if (p && p.title) {
      // 这份缓存如果是"当时正在播放、还没形成一条完成收听"时抓的(listenedAt 为空),直接
      // 摆出来会命中 paint() 里"最近播放"那个不带具体时间的含糊文案(见 status-text 那行
      // 判断),用户没法判断这份数据实际停留在多久之前、跟这次拉取失败是不是同一回事——
      // 用 persistedAt(写入这份缓存时的墙钟时间)兜底出一个真实的"距今多久",复用既有的
      // "上次播放 · X" 文案,不需要新增状态分支。
      const listenedAt = p.listenedAt || (p.persistedAt ? Math.floor(p.persistedAt / 1000) : null);
      await paint({ ...p, playing: false, listenedAt });
    }
    setProgress(null); // 退回"上次播放"语义,不是当下真实进度,别继续顶着一条不会走的进度条
    document.querySelector('.card').classList.remove('stale');
  }

  // 各平台单曲跳转链接（采集器解析后放进 additional_info）。只显示解析到的平台。
  const LINK_IDS = { apple: 'lk-apple', qq: 'lk-qq', netease: 'lk-netease', spotify: 'lk-spotify' };
  function setLinks(links) {
    for (const k in LINK_IDS) {
      const a = el(LINK_IDS[k]); const url = links && links[k];
      if (url) { a.href = url; a.classList.add('show'); }
      else { a.removeAttribute('href'); a.classList.remove('show'); }
    }
  }

  // 页脚"封面/歌词来自XX"如实反映采集器实际解析到的来源(coverSource/lyricsSource,
  // 见 collector/enrich.go)，而不是写死"来自网易云"——封面/歌词各自可能来自网易云/
  // QQ音乐/LRCLIB 三个不同平台，也可能哪个平台都没解析到。
  function sourceLabel(src) {
    if (src === 'netease') return t('sourceNetease');
    if (src === 'qq') return t('sourceQQ');
    if (src === 'kugou') return t('sourceKugou');
    if (src === 'lrclib') return t('sourceLRCLIB');
    return '';
  }
  function renderSourceMeta(coverSource, lyricsSource) {
    const elm = el('footer-meta');
    if (!elm) return;
    const coverLabel = sourceLabel(coverSource), lyricsLabel = sourceLabel(lyricsSource);
    let text = 'Apple Music';
    if (coverLabel && coverLabel === lyricsLabel) {
      text += ` · ${t('coverLyricsVia', coverLabel)}`;
    } else {
      const parts = [];
      if (coverLabel) parts.push(t('coverVia', coverLabel));
      if (lyricsLabel) parts.push(t('lyricsVia', lyricsLabel));
      if (parts.length) text += ` · ${parts.join(' · ')}`;
    }
    elm.textContent = text;
  }

  // 最近播放历史条:LB 已完成的 listen(现含 iPhone),去重取带封面的前几首,
  // 缩略图可点(跳该歌的 Apple/网易云)。每 30s 刷一次。
  async function fetchHistory() {
    if (!moduleConfig.history) { el('history-wrap').classList.add('hidden'); updateLayout(); return; }
    if (USER === 'CHANGE_ME') return;
    // 优先中继 /history:已是归一化条目 {title,artist,listenedAt,durationMs,url},最多 200 条,
    // 足够覆盖一天。中继不通才回退直连 LB(含翻页)。
    if (RELAY) {
      try {
        const d = await fetchJSON(`${RELAY}/history`, 8000);
        if (d && d.ok && Array.isArray(d.items) && d.items.length) {
          const items = d.items.map(x => ({ title: x.title, artist: x.artist || '', url: x.url || '', device: x.device || '', listenedAt: x.listenedAt || 0 }));
          persistHistory(items);
          renderHistory(items);
          renderTodayStatSmart(d.items);
          getMonthCounts().then(applyMonthCounts).catch(() => {});
          return;
        }
      } catch (e) { /* 中继不通 → LB 兜底 */ }
    }
    try {
      const re = await fetchJSON(`${LB}/1/user/${encodeURIComponent(USER)}/listens?count=100`, 12000);
      const listens = (re.payload && re.payload.listens) || [];
      // 跟 state-worker 的 lbHistory() 取值逻辑相近但形状不同:这里只留 renderHistory()
      // 真正用得到的字段,是本地变量不是要对外暴露的 API 响应,没必要跟那边完全同形状。
      const items = listens.filter(l => l.track_metadata && l.track_metadata.track_name).map(l => {
        const m = l.track_metadata, ai = m.additional_info || {};
        return { title: m.track_name, artist: m.artist_name || '', url: ai.apple_music_url || ai.netease_url || ai.qq_music_url || '', device: ai.source || '', listenedAt: l.listened_at || 0 };
      });
      persistHistory(items);
      renderHistory(items);
      const today = await collectTodayListens(listens);
      renderTodayStat(today.map(l => ({ listenedAt: l.listened_at || 0, durationMs: (l.track_metadata && l.track_metadata.additional_info || {}).duration_ms })));
      getMonthCounts().then(applyMonthCounts).catch(() => {});
    } catch (e) {}
  }
  // 收集「今天」的全部 listen 用于统计。LB 单次最多 100 条，超过就用 max_ts 往前翻页，
  // 直到翻到早于当天 0 点(或翻完/到上限)。普通日子首页就已跨过 0 点、只 1 次请求；
  // 只有一天听超 100 首才会多翻几页。上限 10 页(1000 首)兜底，防跑飞。
  async function collectTodayListens(firstPage) {
    const midnight = new Date(); midnight.setHours(0, 0, 0, 0);
    const cutoff = Math.floor(midnight.getTime() / 1000);
    const acc = [];
    let page = firstPage;
    for (let i = 0; i < 10; i++) {
      if (!page || !page.length) break;
      for (const l of page) if ((l.listened_at || 0) >= cutoff) acc.push(l);
      const oldest = page[page.length - 1].listened_at || 0;
      if (oldest < cutoff || page.length < 100) break; // 已跨过 0 点 / 没有更早的了
      const re = await fetchJSON(`${LB}/1/user/${encodeURIComponent(USER)}/listens?count=100&max_ts=${oldest}`, 12000);
      page = (re.payload && re.payload.listens) || [];
    }
    return acc;
  }
  // 近30天每首歌播放次数:中继 /history 最多给 200 条(覆盖不了 30 天),这里独立于历史
  // 列表本身直接翻页 LB 拿全近30天数据统计——请求链路较慢(最多翻 15 页),缓存 15 分钟,
  // 不跟着历史列表每 30s 的刷新一起重算(那样会一直在拉全量近30天数据,浪费且慢)。
  let monthCounts = null, monthCountsAt = 0;
  const MONTH_COUNTS_TTL = 15 * 60 * 1000;
  async function getMonthCounts() {
    const now = Date.now();
    if (monthCounts && now - monthCountsAt < MONTH_COUNTS_TTL) return monthCounts;
    if (USER === 'CHANGE_ME') return new Map();
    const cutoff = Math.floor((now - 30 * 86400000) / 1000);
    const counts = new Map();
    let maxTs = null;
    for (let i = 0; i < 15; i++) {
      const url = maxTs
        ? `${LB}/1/user/${encodeURIComponent(USER)}/listens?count=100&max_ts=${maxTs}`
        : `${LB}/1/user/${encodeURIComponent(USER)}/listens?count=100`;
      let page;
      try {
        const re = await fetchJSON(url, 12000);
        page = (re.payload && re.payload.listens) || [];
      } catch (e) { break; } // 翻页中途失败:用已拿到的部分统计,好过完全没有
      if (!page.length) break;
      let hitCutoff = false;
      for (const l of page) {
        if ((l.listened_at || 0) < cutoff) { hitCutoff = true; continue; }
        const m = l.track_metadata;
        if (!m || !m.track_name) continue;
        const key = `${m.artist_name || ''}|${m.track_name}`;
        counts.set(key, (counts.get(key) || 0) + 1);
      }
      maxTs = page[page.length - 1].listened_at || 0;
      if (hitCutoff || page.length < 100) break; // 已跨过 30 天前 / 没有更早的了
    }
    monthCounts = counts;
    monthCountsAt = now;
    return counts;
  }
  // 把统计结果贴回已渲染的历史行(按 data-key 找,不用重建 DOM/不打断滚动)。
  function applyMonthCounts(counts) {
    document.querySelectorAll('#history .h-count').forEach(el => {
      const c = counts.get(el.dataset.key) || 0;
      el.textContent = c >= 2 ? `×${c}` : '';
      el.title = c >= 2 ? t('playedNTimes', c) : '';
    });
  }

  // relay 路径的今日统计:/history 最多给 200 条(HIST_MAX),正常一天远不到、直接用最快。
  // 但配合单曲循环重复计次(见 loop restart),一天真放出 200+ 条时最旧的会被 /history
  // 截断顶出去导致漏计——判断依据:这 200 条里最旧的一条如果仍然是"今天"，说明可能还有
  // 更早的今天记录被截断在外，这时才退化成跟 LB 兜底路径一样的直连 LB 翻页
  // (collectTodayListens，已经验证过能覆盖完整)。这个信号在正常日子几乎不会触发,不影响
  // relay 本身的国内访问加速。
  async function renderTodayStatSmart(relayItems) {
    const midnight = new Date(); midnight.setHours(0, 0, 0, 0);
    const cutoff = Math.floor(midnight.getTime() / 1000);
    const oldest = relayItems[relayItems.length - 1];
    if (!oldest || (oldest.listenedAt || 0) < cutoff) {
      renderTodayStat(relayItems.map(x => ({ listenedAt: x.listenedAt || 0, durationMs: x.durationMs })));
      return;
    }
    try {
      const re = await fetchJSON(`${LB}/1/user/${encodeURIComponent(USER)}/listens?count=100`, 12000);
      const listens = (re.payload && re.payload.listens) || [];
      const today = await collectTodayListens(listens);
      renderTodayStat(today.map(l => ({ listenedAt: l.listened_at || 0, durationMs: (l.track_metadata && l.track_metadata.additional_info || {}).duration_ms })));
    } catch (e) {
      // 直连也失败:退而求其次用手头这 200 条算(好过完全不显示)，这条分支本来就极少触发。
      renderTodayStat(relayItems.map(x => ({ listenedAt: x.listenedAt || 0, durationMs: x.durationMs })));
    }
  }
  // 今日收听统计:输入归一化条目 [{listenedAt(秒), durationMs}]。按本地当天 0 点过滤。
  // 时长优先用各条 durationMs;iPhone 经 Last.fm 桥接的没有时长,用当天已知时长的均值补估、
  // 并标"约",不假装精确。
  function renderTodayStat(items) {
    const stat = el('today-stat');
    if (!stat) return;
    const midnight = new Date(); midnight.setHours(0, 0, 0, 0);
    const cutoff = Math.floor(midnight.getTime() / 1000);
    let count = 0, knownMs = 0, knownN = 0, unknownN = 0;
    for (const it of items) {
      if ((it.listenedAt || 0) < cutoff) continue;
      count++;
      const dm = it.durationMs;
      if (typeof dm === 'number' && dm > 0) { knownMs += dm; knownN++; } else { unknownN++; }
    }
    if (!count) { stat.textContent = ''; return; }
    const avg = knownN ? knownMs / knownN : 210000; // 未知时长的估值:当天均值，无则 3.5 分
    const totalMs = knownMs + unknownN * avg;
    const mins = Math.round(totalMs / 60000);
    const h = Math.floor(mins / 60), mm = mins % 60;
    const dur = h ? t('hoursMins', h, mm) : t('minsOnly', mm);
    const approx = unknownN > 0 ? t('approx') : '';
    stat.textContent = t('todayStat', count, approx + dur);
  }
  let historySig = ''; // 上次渲染的历史列表签名;内容没变就跳过重建
  // 历史行设备图标(单色线描,走 currentColor→--accent 跟随专辑主色):笔记本=Mac / 手机=iPhone。
  const DEV_ICON = {
    mac: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="11.5" rx="1.6"/><path d="M1.5 20h21"/></svg>',
    iphone: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6.5" y="2" width="11" height="20" rx="2.6"/><path d="M10.5 18.4h3"/></svg>',
  };
  function renderHistory(items) {
    const box = el('history'), wrap = el('history-wrap');
    if (!moduleConfig.history) { wrap.classList.add('hidden'); historySig = ''; updateLayout(); return; }
    if (!items.length) { wrap.classList.add('hidden'); historySig = ''; updateLayout(); return; }
    // 内容没变就整体跳过——否则每 60s / 每次切回标签都会清零用户滚动位置 + 白重建几百个 DOM。
    // 签名里拌上 currentLang:纯粹切语言、不动数据的话,不拌语言这个签名会对得上,导致
    // "更早"分割线之类的文字被这个去重优化拦住、停留在切换前的语言(跟 initComments()
    // 里的 sig 同一个坑,同一个修法)。
    const sig = currentLang + '\n' + items.map(it => `${it.title}|${it.artist}|${it.url || ''}|${it.device || ''}`).join('\n');
    if (sig === historySig && !wrap.classList.contains('hidden')) return;
    const prevTop = box.scrollTop; // 确需重建时先记住滚动位置,建完还原
    historySig = sig;
    box.textContent = '';
    // 今天/更早分界线:与 renderTodayStat 用同一本地零点口径。items 已按时间倒序,只在
    // "先出现过今天的记录、之后才出现更早的记录"时插入一次——纯粹全是今天或全是更早
    // 都不需要分界线(没有今天可对比,分界线毫无意义,徒增噪音)。
    const midnight = new Date(); midnight.setHours(0, 0, 0, 0);
    const todayCutoff = Math.floor(midnight.getTime() / 1000);
    let sawToday = false, dividerShown = false;
    for (const it of items) {
      const isToday = (it.listenedAt || 0) >= todayCutoff;
      if (isToday) sawToday = true;
      if (!dividerShown && sawToday && !isToday) {
        dividerShown = true;
        const div = document.createElement('div'); div.className = 'h-divider'; div.textContent = t('earlier');
        box.appendChild(div);
      }
      const a = document.createElement('a');
      a.title = `${it.title} — ${it.artist}`;
      if (it.url) { a.href = it.url; a.target = '_blank'; a.rel = 'noopener'; }
      if (it.device === 'iphone' || it.device === 'mac') {
        const d = document.createElement('span'); d.className = 'h-dev';
        d.innerHTML = DEV_ICON[it.device]; // 静态可信 SVG,非用户输入
        d.title = it.device === 'iphone' ? 'iPhone' : 'Mac';
        a.appendChild(d);
      }
      // 这个局部变量不能叫 t——同一个 for 循环体块里上面 t('earlier') 用的是外层 i18n
      // 查找函数,若在这个块内任何位置 const t = ...,整个块从块首开始 t 就会被判成指向
      // 这个块作用域变量(暂时性死区),导致 t('earlier') 在运行到那一行时直接抛
      // ReferenceError(Cannot access 't' before initialization)。
      const titleEl = document.createElement('span'); titleEl.className = 'h-title'; titleEl.textContent = it.title;
      const ar = document.createElement('span'); ar.className = 'h-artist'; ar.textContent = it.artist;
      const cnt = document.createElement('span'); cnt.className = 'h-count'; cnt.dataset.key = `${it.artist}|${it.title}`;
      a.appendChild(titleEl); a.appendChild(ar); a.appendChild(cnt); box.appendChild(a);
    }
    box.scrollTop = prevTop;
    wrap.classList.remove('hidden');
    updateLayout();
    alignHistoryCols();
    if (monthCounts) applyMonthCounts(monthCounts); // 缓存已就绪(比如切标签页回来重渲染):立刻贴回,不用等下一轮 fetchHistory
  }
  // 列名行在 #history 的滚动容器外面,不受滚动条挤占宽度影响,数据行在容器里面会被
  // 滚动条吃掉一点可用宽度——两者右边界因此对不齐。滚动条宽度因系统/浏览器而异
  // (macOS 悬浮滚动条通常是0,其它环境可能有实际宽度),写死一个补偿值在不同设备上
  // 反而可能对不齐,这里运行时实测再补偿到列名行的右内边距上。
  function alignHistoryCols() {
    const box = el('history'), cols = document.querySelector('.history-cols');
    if (!box || !cols) return;
    const sbw = box.offsetWidth - box.clientWidth;
    cols.style.paddingRight = (8 + sbw) + 'px';
  }

  // connecting=true(重连中,还没确认到底有没有数据)用动画+琥珀色圆点;false(已确认为空/
  // 未配置)用静态+中性灰——同一个 idle-dot 组件表达两种不同的确定性程度。
  // lastIdleKey/lastIdleConnecting 记的是"上一次调用 paintIdle 时给的是哪个 STRINGS
  // key"(不是解析好的字符串本身)——这样语言切换时 setLang() 才能用新语言重新解析同一个
  // key 再调一遍 paintIdle,而不是把上一次已经解析成某个语言的字符串原样留在屏幕上。
  let lastIdleKey = null, lastIdleConnecting = false;
  function paintIdle(msgKey, connecting) {
    lastIdleKey = msgKey; lastIdleConnecting = !!connecting;
    el('status').classList.remove('live');
    el('status').classList.add('idle');
    el('status').classList.toggle('connecting', !!connecting);
    el('art').classList.remove('playing');
    el('art-wrap').classList.remove('playing');
    if (window.setVinylPlaying) window.setVinylPlaying(false);
    el('progress').classList.remove('is-live');
    document.title = t('docTitleIdle');
    el('status-text').textContent = t('nothingPlaying');
    el('device-icon').textContent = '';
    el('title').textContent = t('quietRightNow');
    el('artist').textContent = msgKey ? t(msgKey) : '';
    el('album').textContent = '';
    setProgress(null);
    setLyrics(null, false, false);
    resetPreview();
    setLinks({});
    setAccent('');
    setStale(false);
  }

  // ---- 同步歌词 ----:采集器把网易云的 原文/翻译/罗马音(逐行 LRC)+ 逐字(yrc)塞进
  // additional_info；这里合并成多行 DOM(罗马音上/原文中/翻译下)，在进度条 rAF 里按外推
  // 位置高亮当前行、有逐字则逐字点亮，并整体位移把当前行滚到中间。
  let lrcLines = [];   // [{t, el, words:[{t,el}]|null}]
  let lrcActive = -1;
  // 手动滑动:用户一滚(滚轮/触摸)就暂停自动跟随;停手 LRC_RESUME_MS 后平滑滚回当前行居中。
  let lrcUserScrolling = false, lrcUserTimer = null;
  const LRC_RESUME_MS = 2600;
  const lrcSmooth = () => !window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function lrcScrollActive(smooth) {
    const box = el('lyrics');
    const i = lrcActive >= 0 ? lrcActive : 0;
    const a = lrcLines[i] && lrcLines[i].el;
    if (!a) return;
    const top = Math.max(0, a.offsetTop + a.clientHeight / 2 - box.clientHeight / 2);
    box.scrollTo({ top, behavior: smooth && lrcSmooth() ? 'smooth' : 'auto' });
  }
  function lrcOnUserScroll() {
    lrcUserScrolling = true;
    if (lrcUserTimer) clearTimeout(lrcUserTimer);
    lrcUserTimer = setTimeout(() => { lrcUserScrolling = false; lrcScrollActive(true); }, LRC_RESUME_MS);
  }
  (function bindLyricScroll() {
    const lw = el('lyrics');
    if (!lw) return;
    // 只认真正的用户输入(滚轮/触摸),不听 scroll 事件 → 天然区分「程序自动滚」与「用户滚」。
    lw.addEventListener('wheel', lrcOnUserScroll, { passive: true });
    lw.addEventListener('touchstart', lrcOnUserScroll, { passive: true });
    lw.addEventListener('touchmove', lrcOnUserScroll, { passive: true });
  })();
  function parseLRC(text) {
    const out = [];
    for (const raw of (text || '').split('\n')) {
      const line = raw.trim();
      const tags = [...line.matchAll(/\[(\d{1,2}):(\d{2})(?:[.:](\d{1,3}))?\]/g)];
      if (!tags.length) continue;
      const txt = line.replace(/\[[^\]]*\]/g, '').trim();
      if (!txt) continue; // 跳过纯标签/元信息行([ti:]、[by:] 等)
      for (const m of tags) {
        const frac = m[3] ? +(m[3] + '00').slice(0, 3) : 0;
        out.push({ t: (+m[1] * 60 + +m[2]) * 1000 + frac, text: txt });
      }
    }
    return out.sort((a, b) => a.t - b.t);
  }
  // 网易云 yrc 逐字：每行 [行始ms,行长ms] 后跟若干 (词始ms,词长ms,0)文字
  function parseYRC(text) {
    const out = [];
    for (const raw of (text || '').split('\n')) {
      const head = raw.match(/^\[(\d+),\d+\]/);
      if (!head) continue;
      const words = [];
      const re = /\((\d+),(\d+),\d+\)([^(]*)/g;
      let m;
      while ((m = re.exec(raw))) { if (m[3] !== '') words.push({ t: +m[1], dur: +m[2], text: m[3] }); }
      if (words.length) out.push({ t: +head[1], words });
    }
    return out.sort((a, b) => a.t - b.t);
  }
  // 在有序 [{t,text}] 里找与 t 最接近(容差内)的文本，把翻译/罗马音贴到对应原文行。
  function nearestText(arr, t, tol) {
    let best = '', bestD = tol;
    for (const it of arr) { const d = Math.abs(it.t - t); if (d <= bestD) { bestD = d; best = it.text; } }
    return best;
  }
  function setLyrics(s, playing, sameTrack) {
    const wrap = el('lyrics'), inner = el('lyrics-inner');
    let show = false;
    if (playing && s) { // 只在播放时显示(才可同步)
      if (!sameTrack || !lrcLines.length) {
        const tr = parseLRC(s.lyricsTr), roma = parseLRC(s.lyricsRoma), yrc = parseYRC(s.lyricsYRC);
        const base = yrc.length ? yrc : parseLRC(s.lyrics); // 有逐字用 yrc，否则用原文逐行
        inner.textContent = ''; lrcActive = -1;
        wrap.scrollTop = 0; lrcUserScrolling = false; if (lrcUserTimer) clearTimeout(lrcUserTimer);
        lrcLines = base.map(ln => {
          const line = document.createElement('div'); line.className = 'lrc-line';
          const rm = nearestText(roma, ln.t, 700);
          if (rm) { const d = document.createElement('div'); d.className = 'lrc-roma'; d.textContent = rm; line.appendChild(d); }
          const main = document.createElement('div'); main.className = 'lrc-main';
          let words = null;
          if (ln.words) {
            words = ln.words.map(w => { const sp = document.createElement('span'); sp.className = 'lrc-w'; sp.textContent = w.text; main.appendChild(sp); return { t: w.t, dur: w.dur || 0, el: sp }; });
          } else { main.textContent = ln.text; }
          line.appendChild(main);
          const tt = nearestText(tr, ln.t, 700);
          if (tt) { const d = document.createElement('div'); d.className = 'lrc-tr'; d.textContent = tt; line.appendChild(d); }
          inner.appendChild(line);
          return { t: ln.t, el: line, words };
        });
      }
      show = lrcLines.length > 0;
    }
    wrap.classList.toggle('show', show);
    updateLayout();
  }
  // 有侧栏内容(歌词/历史/留言墙)时才在宽屏铺两栏;留言墙(2026-07-12新增)常驻显示、
  // 从不加 hidden,所以这个 || 分支目前恒为真——写成 classList 判断而不是直接 || true,
  // 是为了以后如果给留言墙也加"空内容时隐藏"之类的逻辑,这里不用跟着改。
  function updateLayout() {
    // top-artists-wrap 现在是 .np/.side 的同级兄弟节点(2026-07-16 挪的,见它旁边 CSS
    // 注释),不属于 .side 内部,依然不参与这个判断——是否铺两栏只看歌词/历史/留言墙。
    const hasSide = el('lyrics').classList.contains('show') || !el('history-wrap').classList.contains('hidden')
      || !el('comments-wrap').classList.contains('hidden');
    document.querySelector('.card').classList.toggle('two-col', hasSide);
  }
  function syncLyrics(posMs) {
    if (!lrcLines.length) return;
    let idx = -1;
    for (let i = 0; i < lrcLines.length && lrcLines[i].t <= posMs; i++) idx = i;
    if (idx !== lrcActive) {
      // 卡拉OK式景深:只需清旧 active±1(near)范围、再给新 active±1 打标记,不用扫全表。
      for (let d = -1; d <= 1; d++) {
        const l = lrcLines[lrcActive + d];
        if (l) l.el.classList.remove('active', 'lrc-near');
      }
      lrcActive = idx;
      if (idx >= 0) {
        lrcLines[idx].el.classList.add('active');
        if (lrcLines[idx - 1]) lrcLines[idx - 1].el.classList.add('lrc-near');
        if (lrcLines[idx + 1]) lrcLines[idx + 1].el.classList.add('lrc-near');
      }
      if (!lrcUserScrolling) lrcScrollActive(true); // 手动滑动期间不抢滚动,停手后再回中
    }
    // 逐字渐变填色(只处理当前行):每个词按 (posMs-词始)/词长 算填充比例,平滑扫过。
    // 故意不夹到 [0,1]——原来这里夹过,副作用是"还没轮到"和"刚好唱到这个词最前一刻"
    // 变成同一个值 0,CSS 渐变的软过渡带因此在每个未唱到的词开头都露出一小截不该有的
    // 高亮(英文按整词分词,这一小截接近首字母宽度,表现成"提前加载颜色")。不夹的原始
    // 值可能是很负/很大的百分比,交给 CSS 渐变 stop 的单调钳制规则(见上面 .lrc-w 那条
    // 注释)自然处理成整段纯色,不用在这里手动分支。
    const cur = idx >= 0 ? lrcLines[idx] : null;
    if (cur && cur.words) {
      for (const w of cur.words) {
        const f = w.dur > 0 ? (posMs - w.t) / w.dur : (posMs >= w.t ? 1 : 0);
        const pct = Math.round(f * 100);
        if (pct !== w._f) { w._f = pct; w.el.style.setProperty('--fill', pct + '%'); }
      }
    }
  }

  // 进度条：以 progressTs 为锚点外推实时位置（连续播放时 elapsedTime 不刷新，
  // 但 progressMs + (now - progressTs) * rate 恒等于当前位置）；rate=0(暂停)冻结。
  // 只在“当前曲目”(playing-now 返回且含时长)时显示，“上次播放”不显示。
  let pb = null;
  function setProgress(s) {
    if (s && s.playing && s.durationMs > 0 && typeof s.progressTs === 'number') {
      pb = {
        durationMs: s.durationMs,
        progressMs: s.progressMs || 0,
        rate: (s.rate == null ? 1 : s.rate),
        progressTs: s.progressTs,        // 兜底(LB 直连路径无 ageMs 时用本机时钟)
        // 抗时钟偏差:优先用服务器锚点年龄 + 本设备相对差(见 frame)。
        baseAgeMs: (typeof s.ageMs === 'number' ? s.ageMs : null),
        fetchedAt: (typeof s.fetchedAt === 'number' ? s.fetchedAt : null),
        fresh: !!s.relayFresh, // 来自中继 KV(准确)→ 不限龄外推;否则 lb 兜底 → 封顶
      };
      el('progress').classList.add('show');
    } else {
      pb = null;
      el('progress').classList.remove('show');
    }
  }
  function fmtTime(ms) {
    const t = Math.max(0, Math.floor(ms / 1000));
    return Math.floor(t / 60) + ':' + String(t % 60).padStart(2, '0');
  }
  let lastSec = -1;
  function frame() {
    if (pb) {
      let pos = pb.progressMs;
      // 锚点真实年龄:优先"服务器算的年龄 + 本设备收到后走过的相对时间"(只用本设备时钟的
      // 相对差,不看绝对时钟 → 跨设备时钟偏差不影响);无 ageMs(LB 直连)才退回本机绝对时钟。
      const ageMs = (pb.baseAgeMs != null && pb.fetchedAt != null)
        ? pb.baseAgeMs + (Date.now() - pb.fetchedAt)
        : (Date.now() - pb.progressTs);
      // kv 锚点(采集器直推、准确)不限龄外推——连播中途采集器不重写锚点也能一路走对,省 KV 写额度;
      // 只有 lb 兜底锚点(可能陈旧)才封顶 90s,防坏锚点把进度条冲到远超实际。
      const cap = pb.fresh ? Infinity : 90000;
      if (pb.rate > 0 && ageMs > 0 && ageMs < cap) pos += ageMs * pb.rate;
      pos = Math.max(0, Math.min(pb.durationMs, pos));
      el('bar-fill').style.width = (pb.durationMs > 0 ? (pos / pb.durationMs) * 100 : 0) + '%';
      const sec = Math.floor(pos / 1000);
      if (sec !== lastSec) {
        lastSec = sec;
        el('t-cur').textContent = fmtTime(pos);
        el('t-dur').textContent = fmtTime(pb.durationMs);
      }
      syncLyrics(pos);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // 带超时的 JSON 拉取:LB(德国)时慢时挂,不加超时会把 tick 卡住、导致“更新中”一直不散。
  async function fetchJSON(url, ms) {
    const ctl = new AbortController();
    const to = setTimeout(() => ctl.abort(), ms || 8000);
    try { return await (await fetch(url, { cache: 'no-store', signal: ctl.signal })).json(); }
    finally { clearTimeout(to); }
  }
  // fetchJSON 的写版本兄弟函数,给访客留言/表情反应/计数三个新接口用(此前页面全程只读)。
  async function postJSON(url, body, ms) {
    const ctl = new AbortController();
    const to = setTimeout(() => ctl.abort(), ms || 8000);
    try {
      const res = await fetch(url, {
        method: 'POST', cache: 'no-store', signal: ctl.signal,
        headers: { 'content-type': 'application/json' }, body: JSON.stringify(body || {}),
      });
      return await res.json();
    } finally { clearTimeout(to); }
  }

  // 取一次状态：优先自建中继 /now(采集器直推、国内可达、不受 LB 抽风影响);中继本身
  // 连不上(极端:CF 被墙)才回退直连 LB。返回 状态对象 / {empty:true} / null。
  async function fetchState() {
    if (RELAY) {
      try {
        const d = await fetchJSON(`${RELAY}/now`, 4000);
        if (d && d.ok && !d.empty && d.title) {
          return { title: d.title, artist: d.artist, album: d.album, playing: d.playing, listenedAt: d.listenedAt,
            // current:服务端显式标注这是 Mac/iPhone 此刻活跃的曲目(哪怕暂停),不是纯历史
            // fallback——paint() 据此判断"已暂停"(见那边注释);之前这里漏传,"已暂停"分支
            // 因此一直进不去,暂停时只能落到通用的"最近播放"(实测坐实:2026-07-10)。
            current: d.current,
            artwork: d.artwork || '', accent: d.accent || '', source: d.device || '',
            lyrics: d.lyrics || '', lyricsTr: d.lyricsTr || '', lyricsRoma: d.lyricsRoma || '', lyricsYRC: d.lyricsYRC || '',
            coverSource: d.coverSource || '', lyricsSource: d.lyricsSource || '',
            durationMs: d.durationMs, progressMs: d.progressMs, progressTs: d.progressTs, rate: d.rate,
            // 服务器算的锚点年龄 + 本设备收到的时刻:据此外推不依赖本设备绝对时钟(消除跨设备时钟偏差)。
            ageMs: (typeof d.ageMs === 'number' ? d.ageMs : null), fetchedAt: Date.now(), relayFresh: d.source === 'kv',
            links: d.links || {}, modules: d.modules };
        }
        if (d && d.empty) return { empty: true, modules: d.modules };
      } catch (e) { /* 中继不通 → 落到下面 LB 兜底 */ }
    }
    try {
      // 采集器把网易云封面(国内可加载)塞进了 additional_info.cover_url；优先用它，
      // 苹果 mzstatic 在国内已无 CDN 节点、加载不出。
      // fromLB 把 ListenBrainz 原始 listen 归一化成 paint() 能直接吃的形状。
      // ⚠️ state-worker/src/index.js 里的同名函数几乎逐字段相同(多一个 ok 字段、叫
      // device 不叫 source——那边是 relay 自己的 API 响应契约,这边要直接喂给 paint(),
      // 命名不同是特意的)。两处分别部署在 GitHub Pages 和 Cloudflare Workers,没有共用
      // 构建步骤,做不到真的共享同一份源码——改这里的字段,务必去 state-worker 那边也
      // 照样改一遍,否则两边会悄悄不一致。
      const fromLB = (l, playing, listenedAt) => {
        const m = l.track_metadata || {};
        const ai = m.additional_info || {};
        const num = v => (typeof v === 'number' ? v : null);
        return {
          title: m.track_name, artist: m.artist_name, album: m.release_name, playing, listenedAt,
          artwork: ai.cover_url || '', accent: ai.accent_color || '', source: ai.source || '',
          lyrics: ai.lyrics || '', lyricsTr: ai.lyrics_tr || '', lyricsRoma: ai.lyrics_roma || '', lyricsYRC: ai.lyrics_yrc || '',
          coverSource: ai.cover_source || '', lyricsSource: ai.lyrics_source || '',
          links: { apple: ai.apple_music_url, qq: ai.qq_music_url, netease: ai.netease_url, spotify: ai.spotify_url },
          durationMs: num(ai.duration_ms), progressMs: num(ai.progress_ms), progressTs: num(ai.progress_ts), rate: num(ai.playback_rate),
        };
      };
      const pn = await fetchJSON(`${LB}/1/user/${encodeURIComponent(USER)}/playing-now`, 8000);
      const now = pn.payload && pn.payload.listens && pn.payload.listens[0];
      if (now) return fromLB(now, true, null);
      const re = await fetchJSON(`${LB}/1/user/${encodeURIComponent(USER)}/listens?count=1`, 8000);
      const last = re.payload && re.payload.listens && re.payload.listens[0];
      if (last) return fromLB(last, false, last.listened_at);
      return { empty: true };
    } catch (e) { return null; }
  }

  let everRendered = false;
  async function tick() {
    if (USER === 'CHANGE_ME') { paintIdle('notConfigured'); return; }
    const s = await fetchState();
    // 拿到真实响应(哪怕是 empty)才刷新模块开关——总请求失败(s===null)保留上一份已知
    // 有效的配置不动,不能因为一次瞬时失败就把模块打回默认全开。
    if (s) {
      moduleConfig = normalizeModules(s.modules);
      persistModules(moduleConfig);
      applyModuleVisibility();
    }
    // 空闲态兜底只在"纯历史的上次播放"(current!==true,如 LB fallback 给的旧记录)时才
    // 跟本地缓存比新旧——current===true 代表 Mac/iPhone 此刻活跃的曲目(哪怕暂停),是当下
    // 真相,必须直接显示,不能因为它没有 listenedAt(暂停曲目没有"收听于何时"这回事,语义上
    // 合理)就被误判成"数据不可信"从而被本地缓存里几天前的旧记录顶替。
    if (s && !s.empty && !s.playing && s.current !== true) {
      const lv = loadLive();
      if (lv && lv.seenAt && `${lv.artist}|${lv.title}` !== `${s.artist}|${s.title}`
          && (!s.listenedAt || lv.seenAt / 1000 > s.listenedAt)) {
        await paint({ title: lv.title, artist: lv.artist, album: lv.album, artwork: lv.artwork,
          links: lv.links, accent: lv.accent, playing: false, listenedAt: Math.floor(lv.seenAt / 1000) });
        setProgress(null); setStale(false); everRendered = true; return;
      }
    }
    if (s && !s.empty) { await paint(s); setProgress(s); setStale(false); everRendered = true; return; }
    if (s && s.empty) { setProgress(null); if (!everRendered) paintIdle('noListensYet'); else await revertStale(); return; }
    // s === null：数据源都拿不到（LB 抽风等）→ 保留当前显示，不清屏；
    // 但首屏的“更新中…”不能一直挂着，把缓存那首按上次播放正常显示（后台继续重试）。
    if (!everRendered) paintIdle('connectingRetry', true); else await revertStale();
  }

  // 试听按钮:点击切播放/暂停(首次点击才真正加载音频,满足自动播放手势要求)。
  (function initPreview() {
    const btn = el('preview-btn'), a = el('preview-audio');
    if (!btn || !a) return;
    btn.addEventListener('click', () => {
      if (!curPreviewUrl) return;
      if (a.paused) {
        if (a.src !== curPreviewUrl) a.src = curPreviewUrl;
        a.play().catch(() => {});
      } else { a.pause(); }
    });
    a.addEventListener('play', () => { btn.textContent = '⏸'; btn.classList.add('playing'); });
    a.addEventListener('pause', () => { btn.textContent = '▶'; btn.classList.remove('playing'); });
    a.addEventListener('ended', () => { btn.textContent = '▶'; btn.classList.remove('playing'); });
  })();

  // 黑胶转速缓动:播放/暂停切换不再瞬间起停,而是先跑一小段加速/减速关键帧再衔接稳态
  // 匀速循环,模拟真实唱机马达的物理直觉。用 Web Animations API(而非纯 CSS keyframe)是
  // 因为暂停/恢复要衔接"当前转到哪个角度了",纯 CSS 动画重启会看起来跳变。只在黑胶模式
  // 下生效(方形模式沿用 .art.playing 的呼吸缩放，见 CSS)。
  (function initVinylSpin() {
    const art = el('art'), wrap = el('art-wrap');
    if (!art || !wrap) return;
    const STEADY_MS = 18000; // 跟旧版 vinylspin 一致的稳态转速
    const reduceMotion = () => window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let steady = null, transition = null, wantSpin = false;
    // 状态机让重复调用天然幂等:up/steady 都算"正在朝着转起来走"，down/stopped 都算"正在
    // 朝着停下来走"。之前每次调用都无条件 cancel 正在跑的过渡再重开一个新的,轮询期间
    // "仍在播放"重复触发 setVinylPlaying(true) 会不断打断 spin-up、永远等不到 onfinish
    // 交给稳态循环——黑胶实测卡死在原地不转。改成"已经在朝这个方向走就别管"即可修复。
    let state = 'stopped'; // stopped | up | steady | down
    const angleNow = () => steady ? ((steady.currentTime || 0) % STEADY_MS) / STEADY_MS * 360 : 0;
    function ensureSteady() {
      if (!steady) {
        steady = art.animate(
          [{ transform: 'rotate(0deg)' }, { transform: 'rotate(360deg)' }],
          { duration: STEADY_MS, iterations: Infinity, easing: 'linear' }
        );
        steady.pause();
      }
      return steady;
    }
    function stopAll() {
      if (transition) { transition.cancel(); transition = null; }
      if (steady) { steady.cancel(); steady = null; }
      art.style.transform = '';
      state = 'stopped';
    }
    function apply() {
      if (!wrap.classList.contains('vinyl') || reduceMotion()) { stopAll(); return; }
      ensureSteady();
      if (wantSpin) {
        if (state === 'up' || state === 'steady') return; // 已经在转/正在加速,别打断重开
        const from = angleNow();
        if (transition) { transition.cancel(); transition = null; }
        state = 'up';
        transition = art.animate(
          [{ transform: `rotate(${from}deg)` }, { transform: `rotate(${from + 360}deg)` }],
          { duration: 1200, easing: 'cubic-bezier(.13,.79,.24,1)' }
        );
        transition.onfinish = () => {
          transition = null;
          steady.currentTime = (from / 360) * STEADY_MS;
          steady.play();
          state = 'steady';
        };
      } else {
        if (state === 'down' || state === 'stopped') return; // 已经停着/正在减速,别打断重开
        const from = angleNow();
        if (steady.playState === 'running') steady.pause();
        if (transition) { transition.cancel(); transition = null; }
        state = 'down';
        transition = art.animate(
          [{ transform: `rotate(${from}deg)` }, { transform: `rotate(${from + 46}deg)` }],
          { duration: 800, easing: 'cubic-bezier(.22,.61,.36,1)', fill: 'forwards' }
        );
        transition.onfinish = () => { transition = null; state = 'stopped'; };
      }
    }
    window.setVinylPlaying = on => { wantSpin = !!on; apply(); };
    window.__vinylSpinRefresh = apply; // 黑胶/方形切换后重新评估
  })();

  // 工具钮抽屉(仅小屏幕生效,见 max-width:600px 里的 CSS):点"⋯"展开/收起下面三个
  // 真正的按钮,再点一次或点抽屉外任意位置收起。桌面端 .tools-toggle 本来就
  // display:none,这里的开关状态不会影响桌面端观感。
  (function initToolsDrawer() {
    const wrap = el('tools'), toggle = el('tools-toggle');
    if (!wrap || !toggle) return;
    const setOpen = on => {
      wrap.classList.toggle('open', on);
      toggle.classList.toggle('on', on);
      toggle.setAttribute('aria-expanded', on ? 'true' : 'false');
    };
    toggle.addEventListener('click', e => {
      e.stopPropagation();
      setOpen(!wrap.classList.contains('open'));
    });
    document.addEventListener('click', e => {
      if (wrap.classList.contains('open') && !wrap.contains(e.target)) setOpen(false);
    });
  })();

  // 黑胶 / 方形 切换(记忆到 localStorage，右上角小圆钮)。
  (function initVinyl() {
    const wrap = el('art-wrap'), btn = el('vinyl-toggle');
    const apply = on => {
      wrap.classList.toggle('vinyl', on); btn.classList.toggle('on', on);
      if (window.__vinylSpinRefresh) window.__vinylSpinRefresh();
    };
    apply(localStorage.getItem('np:vinyl') !== '0'); // 默认黑胶;仅当用户显式关过('0')才方形
    btn.addEventListener('click', () => {
      const on = !wrap.classList.contains('vinyl');
      apply(on);
      try { localStorage.setItem('np:vinyl', on ? '1' : '0'); } catch (e) {}
    });
  })();

  // 主题切换(氛围/纯黑/浅色,记忆到 localStorage,右上角 🌗 钮)。
  (function initTheme() {
    const btn = el('theme-toggle');
    if (!btn) return;
    const THEMES = ['auto', 'light'];
    const ICON = { auto: '🌗', light: '☀️' };
    const LABEL_KEY = { auto: 'themeAuto', light: 'themeLight' };
    // 参数改名 theme(不能叫 t)——否则会遮蔽外层的 i18n 查找函数 t(),导致下面调用不到它。
    const apply = theme => {
      const root = document.documentElement;
      if (theme === 'auto') root.removeAttribute('data-theme'); else root.setAttribute('data-theme', theme);
      btn.textContent = ICON[theme] || '🌗';
      btn.title = t('themeTitlePrefix') + t(LABEL_KEY[theme] || 'themeAuto') + t('themeTitleSuffix');
    };
    let cur = localStorage.getItem('np:theme');
    if (!THEMES.includes(cur)) cur = 'auto';
    apply(cur);
    btn.addEventListener('click', () => {
      cur = THEMES[(THEMES.indexOf(cur) + 1) % THEMES.length];
      apply(cur);
      try { localStorage.setItem('np:theme', cur); } catch (e) {}
    });
    window.__refreshThemeLabel = () => apply(cur);
  })();

  // 沉浸/全屏模式(⛶ 钮:溶解卡片、放大封面歌词、隐藏杂项 + 尝试浏览器全屏)。不持久化(全屏需手势),
  // 全屏失败(如 iPhone Safari)仍套用沉浸布局;用户按 Esc 退全屏时同步退沉浸。
  (function initImmersive() {
    const btn = el('fs-toggle');
    if (!btn) return;
    const root = document.documentElement;
    const setOn = on => { root.toggleAttribute('data-immersive', on); btn.classList.toggle('on', on); };
    btn.addEventListener('click', () => {
      const on = !root.hasAttribute('data-immersive');
      setOn(on);
      try {
        if (on) { if (root.requestFullscreen) root.requestFullscreen().catch(() => {}); }
        else if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen().catch(() => {});
      } catch (e) {}
    });
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement && root.hasAttribute('data-immersive')) setOn(false);
    });
  })();

  // 语言切换(🌐 钮):在 zh/en 之间切换,setLang() 内部会处理持久化+静态文案+动态内容重绘。
  (function initLangToggle() {
    const btn = el('lang-toggle');
    if (!btn) return;
    btn.addEventListener('click', () => setLang(currentLang === 'zh' ? 'en' : 'zh'));
  })();

  // 访客计数(2026-07-12新增):localStorage 的 np:visited 去重——没这个标记就 POST 一次
  // (后端 +1 并返回总数),打上标记;有标记就只 GET 读总数,不再增加。清缓存/换浏览器/
  // 无痕模式会被重新计入,是用户自己要求的方案,接受这个已知代价。
  (function initVisitorCounter() {
    const elm = el('visitor-count');
    if (!elm || !RELAY || !moduleConfig.visitorCount) return;
    const KEY = 'np:visited';
    let lastTotal = null;
    const paintTotal = () => {
      if (lastTotal === null) return;
      elm.textContent = t('pageViews', lastTotal.toLocaleString(currentLang === 'zh' ? 'zh-CN' : 'en-US'));
    };
    window.__refreshVisitorCount = paintTotal;
    (async () => {
      try {
        const already = localStorage.getItem(KEY) === '1';
        const d = already ? await fetchJSON(`${RELAY}/visit`, 6000) : await postJSON(`${RELAY}/visit`, {}, 6000);
        if (d && d.ok && typeof d.total === 'number') {
          lastTotal = d.total;
          paintTotal();
          elm.classList.remove('hidden');
          if (!already) { try { localStorage.setItem(KEY, '1'); } catch (e) {} }
        }
      } catch (e) {}
    })();
  })();

  // 表情反应(2026-07-12新增,当天改成全局):最初设计成按当前歌曲分开计数,用户反馈
  // 预期跟留言墙一样是全站统一一份、跟哪首歌没关系,改成一次性加载 + 跟留言墙共用 60s
  // 刷新节奏(见 bootstrap 的 window.__fetchComments 那行,一并调用)。真正防刷在后端,
  // 这里的按钮禁用只是防误触双击。
  (function initReactions() {
    // 2026-07-16:用户反馈"不需要这样吧"——六个表情选项太多余,只留一个赞就够,选 ❤️
    // 是因为它已经攒了真实点击数据(改之前線上就是排最前、已经有人点过的那个),换掉会
    // 白丢这份数据。REACTION_EMOJI 保留数组形态(虽然现在只有一个元素)是刻意的——下面
    // 建按钮/计数的循环逻辑不用跟着改,以后万一想恢复多个表情,加回数组元素就行。
    const REACTION_EMOJI = ['❤️'];
    const wrap = el('reactions');
    if (!wrap || !RELAY || !moduleConfig.reactions) return;
    const btns = {};
    for (const emo of REACTION_EMOJI) {
      const b = document.createElement('button');
      b.className = 'reaction-btn'; b.type = 'button';
      b.innerHTML = `<span class="r-emoji">${emo}</span><span class="r-count"></span>`;
      b.addEventListener('click', () => react(emo));
      wrap.appendChild(b);
      btns[emo] = b;
    }
    function paintCounts(counts) {
      for (const emo of REACTION_EMOJI) {
        const c = (counts && counts[emo]) || 0;
        btns[emo].querySelector('.r-count').textContent = c > 0 ? c : '';
      }
    }
    async function fetchReactions() {
      try {
        const d = await fetchJSON(`${RELAY}/reactions`, 6000);
        if (d && d.ok) paintCounts(d.counts || {});
      } catch (e) {}
    }
    async function react(emo) {
      const b = btns[emo];
      b.disabled = true;
      try {
        const d = await postJSON(`${RELAY}/reactions`, { emoji: emo }, 6000);
        if (d && d.ok) paintCounts(d.counts || {});
      } catch (e) {}
      setTimeout(() => { b.disabled = false; }, 800);
    }
    window.__fetchReactions = fetchReactions;
    fetchReactions();
  })();

  // 留言墙(2026-07-12新增):挂在 .side 里,历史列表之后。渲染全程用 textContent/
  // createElement(不用 innerHTML),后端也不做转义——两边配合天然防 XSS(见 CSS 里
  // .comments-wrap 上方注释)。跟历史列表共用 60s 刷新节奏(见 bootstrap),不单独起轮询。
  (function initComments() {
    const wrap = el('comments-wrap'), box = el('comments'), form = el('comment-form'),
          nameInput = el('comment-name'), textInput = el('comment-text'), submitBtn = el('comment-submit');
    if (!wrap || !box || !form || !RELAY || !moduleConfig.comments) return;
    let sig = '', lastItems = null;
    function render(items) {
      lastItems = items;
      // sig 里拼进 currentLang(跟 renderHistory 同一个修法):否则切语言但留言数据没变时,
      // 这个"内容签名没变就跳过重绘"的优化会让"还没有留言"/"匿名"这类固定文案卡在旧语言。
      const s = currentLang + '\n' + items.map(c => `${c.id}|${c.name}|${c.text}`).join('\n');
      if (s === sig) return;
      sig = s;
      box.textContent = '';
      if (!items.length) {
        const empty = document.createElement('div'); empty.className = 'comments-empty'; empty.textContent = t('noComments');
        box.appendChild(empty);
        return;
      }
      for (const c of items) {
        const row = document.createElement('div'); row.className = 'comment-row';
        const head = document.createElement('div'); head.className = 'c-head';
        const name = document.createElement('span'); name.className = 'c-name'; name.textContent = c.name || t('anonymous');
        const time = document.createElement('span'); time.className = 'c-time'; time.textContent = relTime(Math.floor((c.at || 0) / 1000));
        head.appendChild(name); head.appendChild(time);
        const text = document.createElement('div'); text.className = 'c-text'; text.textContent = c.text || '';
        row.appendChild(head); row.appendChild(text);
        box.appendChild(row);
      }
    }
    async function fetchComments() {
      try {
        const d = await fetchJSON(`${RELAY}/comments`, 6000);
        if (d && d.ok && Array.isArray(d.items)) render(d.items);
      } catch (e) {}
    }
    window.__rerenderComments = () => { if (lastItems) render(lastItems); };
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const text = textInput.value.trim();
      if (!text) return;
      submitBtn.disabled = true;
      try {
        const d = await postJSON(`${RELAY}/comments`, { name: nameInput.value.trim(), text }, 6000);
        if (d && d.ok && Array.isArray(d.items)) { textInput.value = ''; render(d.items); }
      } catch (e) {}
      submitBtn.disabled = false;
    });
    window.__fetchComments = fetchComments;
    fetchComments();
  })();

  // 历史播放 Top10 歌手(2026-07-14新增):数据来自采集器一天推一次的 Last.fm 全时段
  // (overall)播放榜(见 collector/topartists.go 的 topArtistsDigest),用户明确要求
  // "不用实时更新,每天更新一次就好"——所以故意只在页面加载时拉一次,不挂进下面
  // fetchHistory/fetchComments/fetchReactions 共用的 60s 刷新节奏:那样做只会每分钟
  // 白打一次 KV 读请求换回同一份数据(采集器一天才写一次),纯粹浪费。头像由采集器解析:
  // QQ 音乐优先、Deezer 兜底(Last.fm 自己的 artist.getinfo 已确认对所有歌手只返回同一张
  // 占位图,查不到真实头像),单张头像加载失败不影响其它 9 个,各自独立兜底成
  // 圆形首字母占位。
  (function initTopArtists() {
    const wrap = el('top-artists-wrap'), box = el('top-artists');
    if (!wrap || !box || !RELAY || !moduleConfig.topArtists) return;
    function fallbackAvatar(name) {
      const d = document.createElement('div');
      d.className = 'ta-avatar-fallback';
      d.textContent = (name || '?').trim().charAt(0).toUpperCase() || '?';
      return d;
    }
    let lastArtists = null;
    function render(artists) {
      box.textContent = '';
      artists.slice(0, 10).forEach((a, i) => {
        const item = document.createElement('div');
        item.className = 'ta-item';
        const avatarWrap = document.createElement('div');
        avatarWrap.className = 'ta-avatar-wrap';
        if (a.avatar) {
          const img = document.createElement('img');
          img.className = 'ta-avatar'; img.loading = 'lazy'; img.alt = a.name || '';
          img.addEventListener('error', () => img.replaceWith(fallbackAvatar(a.name)), { once: true });
          img.src = a.avatar;
          avatarWrap.appendChild(img);
        } else {
          avatarWrap.appendChild(fallbackAvatar(a.name));
        }
        if (i < 3) {
          const rank = document.createElement('span');
          rank.className = 'ta-rank'; rank.textContent = String(i + 1);
          avatarWrap.appendChild(rank);
        }
        const name = document.createElement('div');
        name.className = 'ta-name'; name.textContent = a.name || '';
        name.title = a.playCount ? t('artistPlayCount', a.name, a.playCount) : (a.name || '');
        item.appendChild(avatarWrap); item.appendChild(name);
        box.appendChild(item);
      });
      wrap.classList.remove('hidden');
    }
    window.__rerenderTopArtists = () => { if (lastArtists) render(lastArtists); };
    (async () => {
      try {
        const d = await fetchJSON(`${RELAY}/top-artists`, 6000);
        if (!d || !d.ok || !Array.isArray(d.artists) || !d.artists.length) return;
        lastArtists = d.artists;
        render(lastArtists);
      } catch (e) {}
    })();
  })();

  // 语言切换时把"当前已经画在屏幕上"的动态内容重新画一遍——这里完全没有 SwiftUI/任何
  // 框架的响应式机制托底,t(key) 本身不会触发任何重渲染,必须显式重新调用对应渲染函数。
  // 用 #status 的 idle class 判断当前画的是"空闲态"还是"真实曲目"(现成的 DOM 状态信号,
  // 不用另开变量跟 paint()/paintIdle() 保持同步),分别用各自的方式重新渲染。
  window.__refreshLangDependent = () => {
    if (el('status').classList.contains('idle')) {
      if (lastIdleKey) paintIdle(lastIdleKey, lastIdleConnecting);
    } else {
      const p = loadPersisted();
      if (p && p.title) paint(p);
    }
    const ph = loadPersistedHistory();
    if (ph && ph.length) renderHistory(ph);
    if (window.__rerenderComments) window.__rerenderComments();
    if (window.__rerenderTopArtists) window.__rerenderTopArtists();
    if (window.__refreshThemeLabel) window.__refreshThemeLabel();
    if (window.__refreshVisitorCount) window.__refreshVisitorCount();
  };

  // 静态 HTML 里那些 data-i18n* 标记的文案(按钮 title/aria、placeholder、纯文本 div)
  // 全是硬编码的中文字面量,只有调一遍 applyStaticI18n() 才会按 currentLang 铺成对应语言——
  // 之前只在 setLang() 手动切换时才调用,首次打开页面时如果 detectLang() 判定成英文,
  // 这些静态文案会一直卡在中文,直到用户手动点一次语言切换按钮,所以必须在这里补一次首屏调用。
  applyStaticI18n();

  // 首屏：先用本地缓存的上一首秒渲染（不空等），再拉最新。历史列表也一并用缓存先铺出来
  // (决定两栏版式的 updateLayout() 就看历史区是否隐藏),这样进度条/歌词/历史/两栏宽卡
  // 都在第一帧就是最终形状,tick()/fetchHistory() 落地后只是刷新内容,不再整体改版式。
  const persisted = loadPersisted();
  const persistedHistory = loadPersistedHistory();
  if (persistedHistory && persistedHistory.length) renderHistory(persistedHistory);
  if (persisted && persisted.title) {
    everRendered = true; paint(persisted); setProgress(persisted); setStale(true);
    // 兜底:LB 若全程卡住(所有拉取都超时),“更新中…”最多挂 10 秒就回落到缓存正常态,
    // 别让用户干等——后台每 6s 仍在悄悄重试,恢复了自动换实时。
    setTimeout(revertStale, 10000);
  } else { paintIdle('connecting', true); }

  tick();
  // 历史(74KB)延后,先让实时 now-playing 那条小请求抢到连接、卡片更快出。
  setTimeout(fetchHistory, 800);
  setInterval(() => { if (!document.hidden) tick(); }, POLL_MS);
  setInterval(() => { if (!document.hidden) {
    fetchHistory();
    if (moduleConfig.comments && window.__fetchComments) window.__fetchComments();
    if (moduleConfig.reactions && window.__fetchReactions) window.__fetchReactions();
  } }, 60000);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      tick(); fetchHistory();
      if (moduleConfig.comments && window.__fetchComments) window.__fetchComments();
      if (moduleConfig.reactions && window.__fetchReactions) window.__fetchReactions();
    }
  });

  // Service Worker：缓存页面壳，重复访问秒开（不阻塞首屏）。
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
