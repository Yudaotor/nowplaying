    display: flex; flex-wrap: wrap; gap: 14px; justify-content: center;
    margin-top: 22px;
  }
  .ic {
    display: none; align-items: center; justify-content: center;
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
    color: var(--c); text-decoration: none;
    transition: background .2s ease, transform .1s ease;
  }
  .ic.show { display: inline-flex; }
  .ic:hover { background: rgba(255,255,255,.16); transform: translateY(-1px); }
  .ic svg { width: 22px; height: 22px; display: block; }
  .history-wrap { margin-top: 22px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,.08); text-align: left; }
  .history-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
  .history-title { font-size: 11px; font-weight: 700; letter-spacing: .6px; color: #6b7280; }
  /* "近30天播放"列名:右对齐,跟每行 .h-count 徽章对齐,说明那个数字列是什么意思。 */
  /* 列名跟下面每行的 .h-dev/.h-title/.h-artist/.h-count 一一对齐:占位宽度用同一套数字。 */
  .history-cols { display: flex; align-items: baseline; gap: 10px; padding: 0 8px 4px; }
  .history-cols span { font-size: 10px; color: #6b7280; letter-spacing: .2px; opacity: .8; }
  .history-cols .hc-dev { flex-shrink: 0; width: 14px; }
  .history-cols .hc-title { flex: 1; min-width: 0; }
  .history-cols .hc-artist { flex-shrink: 0; width: 34%; }
  .history-cols .hc-count { flex-shrink: 0; width: 40px; text-align: right; }
  /* 历史列表里"今天"和"更早"之间的分界线:靠左小标签 + 向右延伸的细线。 */
  .h-divider { display: flex; align-items: center; gap: 8px; margin: 10px 2px 4px;
    font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
    color: #6b7280; opacity: .8; user-select: none; }
  .h-divider::after { content: ''; flex: 1; height: 1px; background: currentColor; opacity: .3; }
  .h-divider:first-child { margin-top: 0; }
  .today-stat { font-size: 11px; font-weight: 600; color: var(--accent, #8a91a0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history {
    display: flex; flex-direction: column; gap: 1px;
    max-height: 264px; overflow-y: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.16) transparent;
  }
  .history::-webkit-scrollbar { width: 6px; }
  .history::-webkit-scrollbar-thumb { background: rgba(255,255,255,.16); border-radius: 3px; }
  .history::-webkit-scrollbar-track { background: transparent; }
  .history a {
    display: flex; align-items: baseline; gap: 10px; padding: 7px 8px;
    border-radius: 8px; text-decoration: none; transition: background .15s ease;
  }
  .history a:hover { background: rgba(255,255,255,.06); }
  .history .h-title { flex: 1; min-width: 0; font-size: 13px; color: #dfe2e7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history .h-artist { flex-shrink: 0; max-width: 34%; font-size: 12px; color: #7b8290; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history .h-dev { flex-shrink: 0; display: inline-flex; align-items: center; color: var(--accent, #8a919e); }
  .history .h-dev svg { width: 14px; height: 14px; display: block; }
  /* 近30天播放次数:只在 ≥2 次时才显示(=1 次没有信息量,留白更干净)。 */
  .history .h-count { flex-shrink: 0; width: 40px; text-align: right; font-size: 11px; font-weight: 700; color: var(--accent, #8a919e); font-variant-numeric: tabular-nums; }
  .meta { margin-top: 24px; font-size: 12px; color: #6b7280; }
  .meta a { color: #8a91a0; text-decoration: none; }
  .idle-note { font-size: 14px; color: #9aa3b2; line-height: 1.7; }
  /* 试听按钮:挪进平台链接那一排(排在最前,跟出站链接图标同宽高、同静止态样式,视觉上
     属于一组),不再盖在黑胶/封面上(实测坐实:2026-07-11,右下角悬浮钮会挡住黑胶露出
     的那一小圈边和唱臂落下的位置)。播放中复用 .tool-btn.on 同款 accent 高亮写法。 */
  .preview-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 42px; height: 42px; border-radius: 50%; border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.08); color: #eef0f4; font-size: 15px; line-height: 1;
    cursor: pointer; transition: background .2s ease, transform .1s ease, color .2s ease, border-color .2s ease;
  }
  .preview-btn:hover { background: rgba(255,255,255,.16); transform: translateY(-1px); }
  .preview-btn.playing { color: var(--accent, #fff); border-color: color-mix(in srgb, var(--accent, #fff) 50%, transparent); background: color-mix(in srgb, var(--accent, #fff) 16%, transparent); }
  /* ---- 表情反应(2026-07-12新增,几经改版):全站统一一份计数,跟哪首歌没关系(最初
     设计成按歌曲分开计数,用户反馈预期跟留言墙一样是全局的,当天改)。最早挂在
     .comments-wrap 里、"留言"标题正上方;2026-07-16 精简成只剩 1 个赞之后,用户反馈
     "既然只有一个的话，可以和统计次数那个放在一起，都在页面最底下"——现在跟
     #footer-meta/#visitor-count 一样是 .card 的直接子节点、挂在最后,包一层
     .reactions-footer 方便宽屏 grid 布局整体当一个区块摆放(不用纠结多个元素共用
     同一个 grid-area 到底会不会互相压住,见下面 @media 里的注释)。跟留言墙共用 60s
     刷新节奏,不单独起轮询;真正防刷在后端(限流+每日预算),这里只做按钮级防抖。
     居中对齐,跟 #footer-meta/#visitor-count 那种页脚小字的版式一致(不再是挂在左对齐
     评论区里那版的左对齐)。 ---- */
  .reactions-footer { margin-top: 22px; }
  .reactions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 0 0 6px; }
  /* 2026-07-16:表情从 6 个精简成 1 个赞之后,单独一个胶囊按钮容易让人看不懂是干嘛的,
     加一行小字提示——字号/颜色跟 .comments-empty 那类"页面里的次要说明文字"同一套。 */
  .reactions-hint { font-size: 11px; color: #6b7280; margin: 0; }
  .reaction-btn {
    display: inline-flex; align-items: center; gap: 5px;
    height: 34px; padding: 0 10px; border-radius: 999px; border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.08); color: #eef0f4; font-size: 15px; line-height: 1;
    cursor: pointer; transition: background .2s ease, transform .1s ease, border-color .2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .reaction-btn:hover { background: rgba(255,255,255,.16); transform: translateY(-1px); }
  .reaction-btn:disabled { opacity: .6; cursor: default; transform: none; }
  .r-count { font-size: 11px; font-weight: 700; color: #9aa3b2; font-variant-numeric: tabular-nums; min-width: 8px; }
  /* ---- 留言墙(2026-07-12新增):挂在 .side 里、历史列表之后,复用 .history-wrap/.history
     的滚动列表样式。留言内容用 textContent 渲染(见 initComments),天然防 XSS,后端不做
     二次转义(转义后再 textContent 会把 &lt; 这类符号原样显示给所有人看,是错的)。 ---- */
  .comments-wrap { margin-top: 22px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,.08); text-align: left; }
  .comments-title { font-size: 11px; font-weight: 700; letter-spacing: .6px; color: #6b7280; margin-bottom: 8px; }
  .comments {
    display: flex; flex-direction: column; gap: 2px; margin-bottom: 10px;
    max-height: 200px; overflow-y: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.16) transparent;
  }
  .comments::-webkit-scrollbar { width: 6px; }
  .comments::-webkit-scrollbar-thumb { background: rgba(255,255,255,.16); border-radius: 3px; }
  .comments::-webkit-scrollbar-track { background: transparent; }
  .comments-empty { font-size: 12px; color: #6b7280; padding: 6px 2px; }
  .comment-row { padding: 6px 2px; }
  .c-head { display: flex; align-items: baseline; gap: 8px; }
  .c-name { font-size: 12px; font-weight: 700; color: #c8cdd6; }
  .c-time { font-size: 10px; color: #6b7280; }
  .c-text { font-size: 13px; color: #dfe2e7; margin-top: 2px; overflow-wrap: anywhere; }
  .comment-form { display: flex; flex-wrap: wrap; gap: 8px; }
  .comment-name-input, .comment-text {
    padding: 8px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06); color: #f5f6f8; font-size: 13px; font-family: inherit;
  }
  .comment-name-input { width: 84px; flex-shrink: 0; font-size: 12px; }
  .comment-text { flex: 1 1 160px; min-width: 0; }
  .comment-name-input::placeholder, .comment-text::placeholder { color: #6b7280; }
  .comment-name-input:focus, .comment-text:focus { outline: none; border-color: color-mix(in srgb, var(--accent, #fff) 50%, transparent); }
  .comment-submit {
    flex-shrink: 0; padding: 0 16px; border-radius: 999px; border: 1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.08); color: #eef0f4; font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background .2s ease;
  }
  .comment-submit:hover { background: rgba(255,255,255,.16); }
  .comment-submit:disabled { opacity: .5; cursor: default; }
  /* ---- 历史播放 Top10 歌手(2026-07-14新增,同天用户反馈后挪到 .np 里、播放链接行
     .links 之后——原来挂在 .side 里、留言墙之后,用户要求换到左侧播放区下方)。数据来自
     采集器一天推一次的 Last.fm 全时段(overall)播放榜(见 collector/topartists.go),不
     需要实时,不挂 60s 刷新节奏、只在页面加载时拉一次(见 initTopArtists)。跟
     .history-wrap/.comments-wrap 同一套"细线分隔+小标题"外观,视觉上是同一族的只读小
     面板,只是现在挂在左栏而不是右栏。
     2026-07-16:用户反馈手机端(不铺两栏、纯块状堆叠)这块内容显示在留言区上方,预期是
     页面最底部——根源是 DOM 顺序:这个元素当时被挪进了 .np 内部、在 .side(留言墙所在)
     之前,窄屏没有 grid 时就按 DOM 顺序堆叠,自然排到留言区上面。改成 HTML 里挪到
     .side 后面(整个 .card 的最后一个内容块,紧挨底部的 Apple Music 归属文字之前)——
     窄屏纯块状堆叠时就会顺理成章排到最后。宽屏(≥820px)则靠下面 .card.two-col 里新增
     的 grid-area: ta 规则,在网格布局里精确摆回"左栏、播放链接行下方"这个原来的视觉
     位置,不受 DOM 顺序影响——这正是用 CSS Grid 命名区域的意义:视觉位置和 DOM 顺序
     解耦,不需要 JS 在两种布局之间搬 DOM 节点。 ---- */
  .top-artists-wrap { margin-top: 22px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,.08); text-align: left; }
  .top-artists-wrap.hidden { display: none; }
  .top-artists-title { font-size: 11px; font-weight: 700; letter-spacing: .6px; color: #6b7280; margin-bottom: 10px; }
  .top-artists { display: grid; grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); gap: 14px 6px; }
  .ta-item { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 0; text-decoration: none; }
  .ta-avatar-wrap { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
  .ta-avatar, .ta-avatar-fallback {
    width: 52px; height: 52px; border-radius: 50%; display: block; object-fit: cover;
    background: rgba(255,255,255,.08);
  }
  .ta-avatar-fallback {
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 700; color: #9aa1ad;
  }
  /* 名次角标:只给前 3 名加(有信息量的是"你听最多的前几位",10 个全标反而是噪音)。 */
  .ta-rank {
    position: absolute; top: -3px; right: -3px; min-width: 16px; height: 16px; padding: 0 3px;
    border-radius: 999px; background: var(--accent, #6b7280); color: #fff;
    font-size: 9px; font-weight: 700; line-height: 16px; text-align: center;
    box-shadow: 0 0 0 2px rgba(22,25,33,.9);
  }
  .ta-name {
    font-size: 11px; color: #c8cdd6; text-align: center; max-width: 100%;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  /* ---- 访客计数(2026-07-12新增):挂在 footer-meta 旁边(是兄弟元素,不是子元素!
     renderSourceMeta() 每轮 poll 都会整体覆写 #footer-meta 的 textContent,放里面会被
     反复清空)。localStorage 的 np:visited 去重:同一浏览器只在"从未访问过"时才 POST 一次。 ---- */
  .visitor-count { margin-top: 4px; font-size: 11px; color: #6b7280; }
  /* ---- 主题(data-theme,存 localStorage):auto=氛围封面底(默认,不设属性) / light=浅色 ---- */
  :root[data-theme="light"] { color-scheme: light; }
  :root[data-theme="light"] body { background: #e9ebf0; color: #1c1f26; }
  :root[data-theme="light"] #bg { filter: blur(60px) saturate(1.5) brightness(1.02); opacity: .4; }
  :root[data-theme="light"] .flow.on { opacity: .3; }
  :root[data-theme="light"] .card { background: rgba(255,255,255,.74); border-color: rgba(0,0,0,.08); box-shadow: 0 24px 80px rgba(0,0,0,.22); }
  :root[data-theme="light"] h1 { color: #1c1f26; }
  :root[data-theme="light"] .artist { color: #3a404b; }
  :root[data-theme="light"] .album,
  :root[data-theme="light"] .times,
  :root[data-theme="light"] .meta,
  :root[data-theme="light"] .meta a,
  :root[data-theme="light"] .history-title,
  :root[data-theme="light"] .history-cols span,
  :root[data-theme="light"] .h-divider,
  :root[data-theme="light"] .lrc-roma,
  :root[data-theme="light"] .lrc-tr { color: #7a828f; }
  :root[data-theme="light"] .status { background: rgba(0,0,0,.06); color: #5a616e; }
  :root[data-theme="light"] .lrc-main { color: #5a616e; }
  :root[data-theme="light"] .lrc-line.active .lrc-main { color: var(--accent, #1c1f26); }
  :root[data-theme="light"] .lrc-w { color: #9aa1ad; }
  :root[data-theme="light"] .bar { background: rgba(0,0,0,.12); }
  :root[data-theme="light"] .history .h-title { color: #2a2e37; }
  :root[data-theme="light"] .history .h-artist { color: #7a828f; }
  :root[data-theme="light"] .history a:hover { background: rgba(0,0,0,.05); }
  :root[data-theme="light"] .history-wrap { border-top-color: rgba(0,0,0,.1); }
  :root[data-theme="light"] .ic { background: rgba(0,0,0,.05); border-color: rgba(0,0,0,.12); }
  :root[data-theme="light"] .ic:hover { background: rgba(0,0,0,.1); }
  :root[data-theme="light"] .tool-btn { color: #5a616e; border-color: rgba(0,0,0,.14); background: rgba(0,0,0,.05); }
  :root[data-theme="light"] .reaction-btn { background: rgba(0,0,0,.05); border-color: rgba(0,0,0,.12); color: #1c1f26; }
  :root[data-theme="light"] .reaction-btn:hover { background: rgba(0,0,0,.1); }
  :root[data-theme="light"] .r-count { color: #7a828f; }
  :root[data-theme="light"] .comments-wrap { border-top-color: rgba(0,0,0,.1); }
  :root[data-theme="light"] .comments-title,
  :root[data-theme="light"] .comments-empty,
  :root[data-theme="light"] .reactions-hint,
  :root[data-theme="light"] .c-time,
  :root[data-theme="light"] .visitor-count { color: #7a828f; }
  :root[data-theme="light"] .c-name,
  :root[data-theme="light"] .c-text { color: #2a2e37; }
  :root[data-theme="light"] .comment-name-input,
  :root[data-theme="light"] .comment-text,
  :root[data-theme="light"] .comment-submit { background: rgba(0,0,0,.05); border-color: rgba(0,0,0,.12); color: #1c1f26; }
  :root[data-theme="light"] .comment-submit:hover { background: rgba(0,0,0,.1); }
  :root[data-theme="light"] .top-artists-wrap { border-top-color: rgba(0,0,0,.1); }
  :root[data-theme="light"] .top-artists-title { color: #7a828f; }
  :root[data-theme="light"] .ta-name { color: #2a2e37; }
  :root[data-theme="light"] .ta-avatar, :root[data-theme="light"] .ta-avatar-fallback { background: rgba(0,0,0,.06); }
  :root[data-theme="light"] .ta-rank { box-shadow: 0 0 0 2px rgba(255,255,255,.9); }
  /* ---- 沉浸/全屏模式(data-immersive):溶解卡片、放大封面+歌词、隐藏杂项,适合平板/副屏常驻 ---- */
  :root[data-immersive] body { padding: 0; }
  :root[data-immersive] .tools { top: 18px; right: 18px; opacity: .3; }
  :root[data-immersive] .tools:hover { opacity: 1; }
  :root[data-immersive] .card,
  :root[data-immersive] .card.two-col { width: min(96vw, 1200px); background: transparent; backdrop-filter: none; -webkit-backdrop-filter: none; border: none; box-shadow: none; padding: 3vh 4vw; }
  :root[data-immersive] .links,
  :root[data-immersive] .history-wrap,
  :root[data-immersive] .comments-wrap,
  :root[data-immersive] .top-artists-wrap,
  :root[data-immersive] .reactions-footer,
  :root[data-immersive] .meta,
  :root[data-immersive] .visitor-count,
  :root[data-immersive] .album { display: none; }
  /* 2026-07-16:.reactions 挪出 .comments-wrap、变成 .reactions-footer 包一层的独立
     区块之后,不再是"父级隐藏子级自然跟着隐藏"了——这里补上一条选择器,不然沉浸模式下
     这个赞的按钮会漏网,变成沉浸模式里唯一还留着的交互控件。 */
  :root[data-immersive] .art-wrap { width: min(40vh, 360px); height: min(40vh, 360px); }
  :root[data-immersive] h1 { font-size: clamp(24px, 3.4vw, 40px); }

  :root[data-immersive] .lyrics.show { height: min(52vh, 560px); }
  :root[data-immersive] .lrc-main { font-size: clamp(16px, 1.9vw, 26px); line-height: 1.4; }
  :root[data-immersive] .lrc-tr { font-size: clamp(13px, 1.4vw, 18px); }
  :root[data-immersive] .lrc-roma { font-size: clamp(12px, 1.2vw, 15px); }
  @media (min-width: 820px) {
    :root[data-immersive] .card.two-col { grid-template-columns: min(40vh, 400px) minmax(0, 1fr); column-gap: 6vw; align-items: center; }
    :root[data-immersive] .card.two-col .art-wrap { width: min(40vh, 400px); height: min(40vh, 400px); }
    :root[data-immersive] .card.two-col .lyrics.show { height: min(58vh, 620px); }

  /* ---- 移动端(≤600px)布局收紧:更小内边距/间距 + 响应式封面,让首屏尽量容下封面+信息+歌词开头 ---- */
  @media (max-width: 600px) {
    body { padding: max(12px, env(safe-area-inset-top)) 10px max(14px, env(safe-area-inset-bottom)); }
    .card { padding: 22px 16px 20px; border-radius: 22px; }
    .art-wrap { width: min(210px, 58vw); height: min(210px, 58vw); margin: 0 auto 16px; }
    .status { margin-bottom: 12px; }
    h1 { font-size: 20px; }
    .artist { font-size: 15px; }
    .progress { margin-top: 16px; }
    .links { margin-top: 16px; gap: 12px; }
    .reactions-footer { margin-top: 16px; }
    .reactions { gap: 8px; }
    .lyrics { margin-top: 14px; }
    .lyrics.show { height: 160px; }
    .history-wrap { margin-top: 16px; padding-top: 14px; }
    .history { max-height: 220px; }
    .comments-wrap { margin-top: 16px; padding-top: 14px; }
    .comments { max-height: 160px; }
    .meta { margin-top: 16px; }
    /* 工具钮抽屉:小屏幕横排三个圆钮会跟黑胶模式下悬在封面右上方的唱臂图形打架
       (实测坐实:2026-07-11)。平时只露一个"⋯"入口,点开才竖着展开三个真正的按钮,
